async function goForum(){PAGE='forum';renderNav();const c=document.getElementById('cnt');c.innerHTML='<div style="text-align:center;padding:3rem"><span class="spin"></span></div>';try{forumPosts=await GET('/forum');renderForumList();}catch(e){c.innerHTML=`<p style="color:var(--red)">${esc(e.message)}</p>`;}}
function renderForumList(){const c=document.getElementById('cnt');c.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem"><h2 style="font-family:'Unbounded',sans-serif;font-size:1rem">💬 Форум</h2><button class="btn bp bsm" onclick="showNewForum()"><i class="fas fa-plus"></i> Новая тема</button></div><div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.85rem"><button class="btn bs bsm" onclick="filterForum(null)">Все</button>${Object.entries(FCAT).map(([k,v])=>`<button class="btn bs bsm" onclick="filterForum('${k}')">${v.i} ${v.l}</button>`).join('')}</div><div id="fl">${buildForumItems(forumPosts)}</div>`;}
function buildForumItems(posts){if(!posts.length)return'<p style="color:var(--txt2);text-align:center;padding:2rem">Нет тем</p>';return posts.map(p=>{const cat=FCAT[p.category]||FCAT.other;return`<div class="pc" style="cursor:pointer" onclick="openForumPost('${p.id}')"><div style="display:flex;align-items:flex-start;gap:.65rem"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-bottom:.2rem">${p.pinned?'<span style="color:var(--yellow);font-size:.7rem">📌</span>':''}<span style="font-size:.7rem;font-weight:700;color:${cat.c}">${cat.i} ${cat.l}</span><span style="font-size:.7rem;color:${p.status==='closed'?'var(--txt2)':'var(--green)'}">${p.status==='closed'?'🔒':'🟢'}</span></div><div style="font-weight:700;font-size:.93rem;margin-bottom:.15rem">${esc(p.title)}</div><div style="color:var(--txt2);font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.text.substring(0,100))}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:.71rem;color:var(--txt2)">${ago(p.ts)}</div><div style="font-size:.76rem;color:var(--txt2)">💬 ${p.replyCount||0}</div></div></div><div style="display:flex;align-items:center;gap:.35rem;margin-top:.45rem"><img src="${p.author?.avatar||ava(p.author?.name||'?')}" style="width:16px;height:16px;border-radius:50%"><span style="font-size:.73rem;color:var(--txt2)">${esc(p.author?.name||'?')}</span>${srBadge(p.author)}</div></div>`;}).join('');}
function filterForum(cat){const items=cat?forumPosts.filter(p=>p.category===cat):forumPosts;const el=document.getElementById('fl');if(el)el.innerHTML=buildForumItems(items);}
function showNewForum(){showModal('🆕 Новая тема',`<div class="fg"><label>Заголовок</label><input id="fc-t"></div><div class="fg"><label>Категория</label><select id="fc-c">${Object.entries(FCAT).map(([k,v])=>`<option value="${k}">${v.i} ${v.l}</option>`).join('')}</select></div><div class="fg"><label>Описание</label><textarea id="fc-tx" rows="5"></textarea></div><div class="fg"><label>Фото</label><input id="fc-img" type="file" accept="image/*"></div><button class="btn bp" id="fc-btn" onclick="submitForumPost()"><i class="fas fa-paper-plane"></i> Отправить</button>`);}
async function submitForumPost(){const title=(document.getElementById('fc-t').value||'').trim();const text=(document.getElementById('fc-tx').value||'').trim();if(!title||!text){toast('Заполните поля','err');return;}const btn=document.getElementById('fc-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';let img=null;const f=document.getElementById('fc-img').files[0];if(f)try{img=await rf(f);}catch{}try{const post=await POST('/forum',{title,text,category:document.getElementById('fc-c').value,img});forumPosts.unshift({...post,replyCount:0});closeModal();renderForumList();toast('Создано!','ok');}catch(e){toast(e.message,'err');}btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Отправить';}
async function openForumPost(id){const c=document.getElementById('cnt');c.innerHTML='<div style="text-align:center;padding:3rem"><span class="spin"></span></div>';try{const post=await GET('/forum/'+id);renderForumPost(post);}catch(e){c.innerHTML=`<p style="color:var(--red)">${esc(e.message)}</p>`;}}
function renderForumPost(post){const c=document.getElementById('cnt');const cat=FCAT[post.category]||FCAT.other;const canRep=isStaff(me)||(post.authorId===me.id);const canMg=isStaff(me);const canDel=me&&(post.authorId===me.id||canMg);c.innerHTML=`<button class="btn bs bsm" style="margin-bottom:.65rem" onclick="goForum()"><i class="fas fa-arrow-left"></i> Форум</button><div class="pc"><div style="display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-bottom:.55rem"><span style="font-size:.76rem;font-weight:700;color:${cat.c}">${cat.i} ${cat.l}</span><span style="font-size:.73rem;color:${post.status==='closed'?'var(--txt2)':'var(--green)'}">${post.status==='closed'?'🔒 Закрыто':'🟢 Открыто'}</span>${post.pinned?'<span style="font-size:.7rem;color:var(--yellow)">📌</span>':''}</div><h2 style="font-family:'Unbounded',sans-serif;font-size:.98rem;margin-bottom:.65rem">${esc(post.title)}</h2><div style="display:flex;align-items:center;gap:.45rem;margin-bottom:.65rem"><img src="${post.author?.avatar||ava(post.author?.name||'?')}" style="width:32px;height:32px;border-radius:50%;object-fit:cover"><div><div style="font-weight:700;font-size:.86rem">${esc(post.author?.name||'?')} ${srBadge(post.author)}</div><div style="color:var(--txt2);font-size:.71rem">${ago(post.ts)}</div></div></div><div class="ptxt">${esc(post.text)}</div>${post.img?`<img src="${post.img}" class="pimg" onclick="openLB(this.src)">`:''}${canMg||canDel?`<div style="display:flex;gap:.4rem;margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border);flex-wrap:wrap">${canMg?`<button class="btn bs bsm" onclick="toggleFS('${post.id}')">${post.status==='open'?'🔒 Закрыть':'🟢 Открыть'}</button><button class="btn bs bsm" onclick="toggleFP('${post.id}')">${post.pinned?'📌 Открепить':'📌 Закрепить'}</button>`:''} ${canDel?`<button class="btn bd bsm" onclick="showConfirm('Удалить тему?','',()=>delForumPost('${post.id}'),'Удалить','bd')">🗑</button>`:''}</div>`:''}
</div><h3 style="font-family:'Unbounded',sans-serif;font-size:.78rem;color:var(--txt2);letter-spacing:.5px;margin:.65rem 0">ОТВЕТЫ (${(post.replies||[]).length})</h3><div id="fp-reps">${(post.replies||[]).map(r=>{const isSR=isStaff(r.author);const cdR=me&&(r.authorId===me.id||canMg);return`<div class="pc" style="${isSR?'border-color:var(--blue);background:rgba(79,142,247,.04)':''}">  ${isSR?`<div style="font-size:.7rem;color:var(--blue);font-weight:700;margin-bottom:.35rem">👮 Ответ персонала</div>`:''}<div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.45rem"><div style="display:flex;align-items:center;gap:.4rem"><img src="${r.author?.avatar||ava(r.author?.name||'?')}" style="width:28px;height:28px;border-radius:50%;object-fit:cover"><div style="font-weight:700;font-size:.83rem">${esc(r.author?.name||'?')} ${srBadge(r.author)}</div><div style="color:var(--txt2);font-size:.7rem">${ago(r.ts)}</div></div>${cdR?`<button onclick="showConfirm('Удалить ответ?','',()=>delForumReply('${post.id}','${r.id}'),'Удалить','bd')" style="background:none;border:none;color:var(--txt2);cursor:pointer;font-size:.82rem" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--txt2)'"><i class="fas fa-trash"></i></button>`:''}</div><div class="ptxt">${esc(r.text)}</div>${r.img?`<img src="${r.img}" class="pimg" onclick="openLB(this.src)">`:''}  </div>`;}).join('')||'<p style="color:var(--txt2);text-align:center;font-size:.84rem;padding:1rem">Нет ответов</p>'}</div>${canRep&&post.status==='open'?`<div class="pc" style="margin-top:.65rem"><div style="font-weight:700;font-size:.84rem;margin-bottom:.65rem">${isStaff(me)?'👮 Ответ персонала':'✍️ Ответить'}</div><div class="fg"><textarea id="fp-rep" rows="3" placeholder="Ваш ответ..."></textarea></div><div class="fg"><input id="fp-rim" type="file" accept="image/*"></div><button class="btn bp bsm" id="fp-rbtn" onclick="submitForumReply('${post.id}')"><i class="fas fa-paper-plane"></i> Отправить</button></div>`:post.status==='closed'?`<div style="text-align:center;padding:1rem;color:var(--txt2);background:var(--bg3);border-radius:12px;margin-top:.65rem">🔒 Тема закрыта</div>`:`<div style="text-align:center;padding:1rem;color:var(--txt2);background:var(--bg3);border-radius:12px;margin-top:.65rem">Только персонал может отвечать</div>`}`;}
async function submitForumReply(pid){const text=(document.getElementById('fp-rep').value||'').trim();if(!text){toast('Введите ответ','err');return;}const btn=document.getElementById('fp-rbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';let img=null;const f=document.getElementById('fp-rim').files[0];if(f)try{img=await rf(f);}catch{}try{const post=await POST('/forum/'+pid+'/reply',{text,img});renderForumPost(post);toast('Ответ отправлен','ok');}catch(e){toast(e.message,'err');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Отправить';}}
async function delForumReply(pid,rid){try{await DEL('/forum/'+pid+'/reply/'+rid);const post=await GET('/forum/'+pid);renderForumPost(post);}catch(e){toast(e.message,'err');}}
async function toggleFS(id){try{const p=await POST('/forum/'+id+'/status');renderForumPost(p);}catch(e){toast(e.message,'err');}}
async function toggleFP(id){try{const p=await POST('/forum/'+id+'/pin');renderForumPost(p);}catch(e){toast(e.message,'err');}}
async function delForumPost(id){try{await DEL('/forum/'+id);toast('Удалено','ok');goForum();}catch(e){toast(e.message,'err');}}

function renderCompList(){const c=document.getElementById('cnt');c.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem"><h2 style="font-family:'Unbounded',sans-serif;font-size:1rem">🚩 ${isStaff(me)?'Все жалобы':'Мои жалобы'}</h2><button class="btn bp bsm" onclick="showNewComp()"><i class="fas fa-plus"></i> Подать жалобу</button></div>${!complaints.length?'<p style="color:var(--txt2);text-align:center;padding:2rem">Нет жалоб</p>':''}${complaints.map(comp=>{const st=CSTAT[comp.status]||CSTAT.pending;return`<div class="pc" style="cursor:pointer" onclick="openComp('${comp.id}')"><div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap"><span style="font-size:.74rem;font-weight:700;color:${st.c};background:${st.c}18;padding:.12rem .5rem;border-radius:6px">${st.l}</span><span style="font-size:.72rem;color:var(--txt2)">${ago(comp.ts)} · 💬 ${(comp.replies||[]).length}</span></div><div style="margin-top:.35rem;font-size:.87rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(comp.text)}</div>${isStaff(me)&&comp.author?`<div style="font-size:.73rem;color:var(--txt2);margin-top:.2rem">от ${esc(comp.author.name||'?')}</div>`:''}</div>`;}).join('')}`;}

async function submitComp(){const text=(document.getElementById('comp-text').value||'').trim();if(!text){toast('Опишите проблему','err');return;}const btn=document.getElementById('comp-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';let img=null;const f=document.getElementById('comp-img').files[0];if(f)try{img=await rf(f);}catch{}try{await POST('/complaints',{text,type:document.getElementById('comp-type').value,img});closeModal();goComplaints();toast('Жалоба отправлена!','ok');}catch(e){toast(e.message,'err');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Отправить';}}
function openComp(id){const comp=complaints.find(c=>c.id===id);if(!comp)return;const st=CSTAT[comp.status]||CSTAT.pending;const canRep=isStaff(me);showModal('🚩 Жалоба',`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem;flex-wrap:wrap"><span style="font-size:.76rem;font-weight:700;color:${st.c};background:${st.c}18;padding:.2rem .6rem;border-radius:6px">${st.l}</span><span style="color:var(--txt2);font-size:.76rem">${ago(comp.ts)}</span></div><div style="background:var(--bg3);border-radius:12px;padding:.8rem;margin-bottom:.75rem"><div style="font-size:.86rem;line-height:1.6">${esc(comp.text)}</div>${comp.img?`<img src="${comp.img}" style="max-width:100%;border-radius:8px;margin-top:.5rem;cursor:pointer" onclick="openLB(this.src)">`:''}
</div>${canRep?`<div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.85rem">${Object.entries(CSTAT).map(([k,v])=>`<button class="btn bs bsm" style="color:${v.c};border-color:${v.c};font-size:.74rem" onclick="setCS('${id}','${k}')">${v.l}</button>`).join('')}</div>`:''}<div id="cr-reps" style="max-height:240px;overflow-y:auto;margin-bottom:.75rem;display:flex;flex-direction:column;gap:.45rem">${(comp.replies||[]).map(r=>`<div style="background:${isStaff(r.author)?'rgba(79,142,247,.07)':'var(--bg3)'};border-radius:10px;padding:.6rem .8rem;border:1px solid ${isStaff(r.author)?'var(--blue)':'var(--border)'}"> ${isStaff(r.author)?`<div style="font-size:.7rem;color:var(--blue);font-weight:700;margin-bottom:.15rem">👮 ${esc(r.author?.name||'?')}</div>`:''}<div style="font-size:.86rem">${esc(r.text)}</div><div style="font-size:.7rem;color:var(--txt2);margin-top:.2rem">${ago(r.ts)}</div></div>`).join('')||'<p style="color:var(--txt2);text-align:center;font-size:.82rem;padding:.5rem">Нет ответов</p>'}</div>${canRep?`<div style="display:flex;gap:.5rem"><input id="cr-inp" type="text" placeholder="Ответить..." style="flex:1;padding:.6rem .9rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none" onkeydown="if(event.key==='Enter')sendCR('${id}')"><button class="sbtn" onclick="sendCR('${id}')"><i class="fas fa-paper-plane"></i></button></div>`:''}<div style="margin-top:.75rem;display:flex;gap:.5rem">${comp.authorId===me.id||isOwner()||me.siteRole==='admin'?`<button class="btn bd bsm" onclick="showConfirm('Удалить жалобу?','',()=>delComp('${id}'),'Удалить','bd')"><i class="fas fa-trash"></i> Удалить</button>`:''}`);}
async function sendCR(id){const inp=document.getElementById('cr-inp');const text=(inp.value||'').trim();if(!text)return;inp.value='';try{const r=await POST('/complaints/'+id+'/reply',{text});const i=complaints.findIndex(c=>c.id===id);if(i>=0)complaints[i].replies=[...(complaints[i].replies||[]),{...r,author:me}];closeModal();openComp(id);toast('Ответ отправлен','ok');}catch(e){toast(e.message,'err');}}
async function setCS(id,status){try{await POST('/complaints/'+id+'/status',{status});const i=complaints.findIndex(c=>c.id===id);if(i>=0)complaints[i].status=status;closeModal();openComp(id);toast('Статус изменён','ok');}catch(e){toast(e.message,'err');}}
async function delComp(id){try{await DEL('/complaints/'+id);complaints=complaints.filter(c=>c.id!==id);closeModal();renderCompList();toast('Удалено','ok');}catch(e){toast(e.message,'err');}}
// ADMIN
function renderAdmin(){if(!isOwner()){document.getElementById('cnt').innerHTML='<p style="color:var(--red)">Доступ запрещён</p>';return;}const TABS=[['overview','📊 Обзор'],['users','👥 Пользователи'],['posts','📝 Посты'],['comms','🏘 Сообщества'],['verify','✅ Верификация'],['roles','🎭 Роли'],['complaints','🚩 Жалобы'],['broadcast','📢 Рассылка']];const c=document.getElementById('cnt');let body='';
if(ADMTAB==='overview'){body=`<div class="sg"><div class="sc"><div class="sv2" style="color:var(--blue)">${allUsers.length}</div><div class="sl">Пользователей</div></div><div class="sc"><div class="sv2" style="color:var(--green)">${allPosts.length}</div><div class="sl">Постов</div></div><div class="sc"><div class="sv2" style="color:var(--purple)">${allComms.length}</div><div class="sl">Сообществ</div></div><div class="sc"><div class="sv2" style="color:var(--green)">${onlineUsers.size}</div><div class="sl">Онлайн</div></div><div class="sc"><div class="sv2" style="color:var(--yellow)">${allStories.length}</div><div class="sl">Историй</div></div></div>${allUsers.slice(0,5).map(u=>`<div class="ur"><div style="position:relative"><img class="ava" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div><div class="uri" style="cursor:pointer" onclick="viewUser('${u.id}')"><div class="un">${esc(u.name)}${u.verified?' ✅':''} ${srBadge(u)}</div><div class="us">${esc(u.email)}</div></div></div>`).join('')}`;}
else if(ADMTAB==='users'){body=`<div style="margin-bottom:.75rem"><input id="adm-s" placeholder="🔍 Поиск..." oninput="admSrch()" style="width:100%;padding:.6rem .9rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none"></div><div id="adm-ul">${allUsers.map(u=>`<div class="ur adm-ur" data-n="${u.name.toLowerCase()}" data-u="${u.username.toLowerCase()}"><div style="position:relative"><img class="ava" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div><div class="uri" style="cursor:pointer" onclick="viewUser('${u.id}')"><div class="un">${esc(u.name)}${u.verified?' ✅':''} ${srBadge(u)}</div><div class="us">${esc(u.username)} · ${esc(u.email)}${u.isBanned?' 🚫':u.isMuted?' 🔇':''}</div></div><div class="ura">${u.email!==OE?`<button class="btn bsm" style="background:${u.verified?'var(--red)':'var(--green)'};color:#fff;font-size:.72rem" onclick="atV('${u.id}')">✅</button><button class="btn bs bsm" style="font-size:.72rem" onclick="showMuteDialog('${u.id}','${esc(u.name)}')">🔇</button><button class="btn bd bsm" style="font-size:.72rem" onclick="showBanDialog('${u.id}','${esc(u.name)}')">🚫</button>${u.isBanned?`<button class="btn bg2c bsm" style="font-size:.72rem" onclick="atUB('${u.id}')">Разбан</button>`:''}<button class="btn bs bsm" style="color:var(--red);font-size:.72rem" onclick="showConfirm('Удалить?','',()=>atDU('${u.id}'),'Удалить','bd')">🗑</button>`:'<span style="color:var(--txt2);font-size:.75rem">👑</span>'}</div></div>`).join('')}</div>`;}
else if(ADMTAB==='posts'){body=allPosts.slice(0,60).map(p=>{const au=p.communityId?fc(p.communityId):fu(p.authorId);return`<div class="ur"><div class="uri"><div class="un" style="font-size:.83rem">${au?esc(au.name):'?'} <span style="color:var(--txt2);font-weight:400">· ${ago(p.ts)}</span></div><div class="us">${esc((p.text||'').substring(0,80))}</div></div><button class="btn bd bsm" onclick="showConfirm('Удалить?','',()=>atDP('${p.id}'),'Удалить','bd')">🗑</button></div>`;}).join('');}
else if(ADMTAB==='comms'){body=allComms.map(c=>`<div class="ur"><img class="ava" src="${c.avatar||ava(c.name)}" style="border-radius:10px" onerror="this.src='${ava(c.name)}'"><div class="uri"><div class="un">${esc(c.name)}${c.verified?' ✅':''}</div></div><div class="ura"><button class="btn bsm" style="background:${c.verified?'var(--red)':'var(--green)'};color:#fff;font-size:.72rem" onclick="atTC('${c.id}')">✅</button><button class="btn bd bsm" onclick="showConfirm('Удалить?','',()=>atDC('${c.id}'),'Удалить','bd')">🗑</button></div></div>`).join('')||'<p style="color:var(--txt2)">Нет сообществ</p>';}
else if(ADMTAB==='verify'){body='<div id="vrc"><span class="spin"></span></div>';setTimeout(async()=>{try{const vrs=await GET('/admin/verReqs');const el=document.getElementById('vrc');if(!el)return;el.innerHTML=vrs.map(r=>{const u=fu(r.uid);return u?`<div class="ur"><div style="position:relative"><img class="ava" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div><div class="uri"><div class="un">${esc(u.name)}</div><div class="us">${esc(u.email)}</div></div><div class="ura"><button class="btn bg2c bsm" onclick="atAV('${r.id}')">✅</button><button class="btn bs bsm" onclick="atRV('${r.id}')">❌</button></div></div>`:''}).join('')||'<p style="color:var(--txt2)">Нет заявок</p>';}catch(e){const el=document.getElementById('vrc');if(el)el.innerHTML=`<p style="color:var(--red)">${esc(e.message)}</p>`;}},0);}
else if(ADMTAB==='roles'){body=`<div style="background:var(--bg3);border-radius:12px;padding:.8rem;margin-bottom:1rem;font-size:.81rem;color:var(--txt2)"><div>👑 Владелец - полный доступ</div><div>🛡️ Администратор - управление сайтом</div><div>⚡ Модератор - форум, жалобы</div><div>🤝 Помощник - ответы на форуме</div></div>${allUsers.filter(u=>u.email!==OE).map(u=>`<div class="ur"><div style="position:relative"><img class="ava" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div><div class="uri"><div class="un">${esc(u.name)} ${srBadge(u)}</div><div class="us">${esc(u.username)}</div></div><select onchange="atSR('${u.id}',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.3rem .55rem;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.82rem">${['admin','moderator','helper','user'].map(r=>`<option value="${r}"${(u.siteRole||'user')===r?' selected':''}>${{admin:'🛡️ Admin',moderator:'⚡ Mod',helper:'🤝 Helper',user:'👤 User'}[r]}</option>`).join('')}</select></div>`).join('')}`;}
else if(ADMTAB==='complaints'){body='<div id="adm-comps"><span class="spin"></span></div>';setTimeout(async()=>{try{const comps=await GET('/complaints');const el=document.getElementById('adm-comps');if(!el)return;el.innerHTML=comps.map(comp=>{const st=CSTAT[comp.status]||CSTAT.pending;return`<div class="ur" style="cursor:pointer" onclick="goComplaints()"><div class="uri"><div class="un"><span style="color:${st.c};font-size:.75rem">${st.l}</span>${comp.author?` · ${esc(comp.author.name||'?')}`:''}</div><div class="us">${esc(comp.text.substring(0,70))}</div><div style="font-size:.71rem;color:var(--txt2)">${ago(comp.ts)} · 💬 ${(comp.replies||[]).length}</div></div></div>`;}).join('')||'<p style="color:var(--txt2)">Нет жалоб</p>';}catch(e){const el=document.getElementById('adm-comps');if(el)el.innerHTML=`<p style="color:var(--red)">${esc(e.message)}</p>`;}},0);}
else if(ADMTAB==='broadcast'){body=`<p style="color:var(--txt2);font-size:.87rem;margin-bottom:1rem">Сообщение получат все ${allUsers.length-1} пользователей.</p><div class="fg"><textarea id="bc-t" rows="4" placeholder="Текст..."></textarea></div><button class="btn bp" onclick="doBC()"><i class="fas fa-bullhorn"></i> Отправить всем</button>`;}
c.innerHTML=`<h2 style="font-family:'Unbounded',sans-serif;font-size:1rem;margin-bottom:1rem"><i class="fas fa-shield-alt" style="color:var(--blue)"></i> Администратор</h2><div class="atabs">${TABS.map(([id,l])=>`<button class="at${ADMTAB===id?' active':''}" onclick="setAT('${id}')">${l}</button>`).join('')}</div>${body}`;}
const setAT=t=>{ADMTAB=t;renderAdmin();};
function admSrch(){const q=(document.getElementById('adm-s')?.value||'').toLowerCase();document.querySelectorAll('.adm-ur').forEach(r=>r.style.display=(r.dataset.n.includes(q)||r.dataset.u.includes(q))?'':'none');}
async function atV(uid){try{await POST('/admin/users/'+uid+'/verify');await loadAll();renderAdmin();}catch(e){toast(e.message,'err');}}
async function atUB(uid){try{await POST('/admin/users/'+uid+'/unban');await loadAll();renderAdmin();toast('Разблокирован','ok');}catch(e){toast(e.message,'err');}}
async function atAV(rid){try{await POST('/admin/verReqs/'+rid+'/approve');await loadAll();renderAdmin();toast('Верифицирован','ok');}catch(e){toast(e.message,'err');}}
async function atRV(rid){try{await POST('/admin/verReqs/'+rid+'/reject');await loadAll();renderAdmin();}catch(e){toast(e.message,'err');}}
async function atDU(uid){try{await DEL('/admin/users/'+uid);await loadAll();renderAdmin();toast('Удалён','ok');}catch(e){toast(e.message,'err');}}
async function atDP(pid){try{await DEL('/admin/posts/'+pid);allPosts=allPosts.filter(p=>p.id!==pid);renderAdmin();}catch(e){toast(e.message,'err');}}
async function atTC(cId){try{await POST('/admin/communities/'+cId+'/verify');await loadAll();renderAdmin();}catch(e){toast(e.message,'err');}}
async function atDC(cId){try{await DEL('/admin/communities/'+cId);await loadAll();renderAdmin();}catch(e){toast(e.message,'err');}}
async function atSR(uid,role){try{await POST('/admin/users/'+uid+'/siteRole',{role});await loadAll();me=allUsers.find(u=>u.id===me.id)||me;renderAdmin();toast('Роль обновлена','ok');}catch(e){toast(e.message,'err');}}
async function doBC(){const text=(document.getElementById('bc-t')?.value||'').trim();if(!text){toast('Введите текст','err');return;}try{const r=await POST('/admin/broadcast',{text});document.getElementById('bc-t').value='';toast(`Отправлено ${r.sent} пользователям!`,'ok');}catch(e){toast(e.message,'err');}}

// AUTH
function showLi(){document.getElementById('a-li').style.display='';document.getElementById('a-rg').style.display='none';}
function showReg(){document.getElementById('a-li').style.display='none';document.getElementById('a-rg').style.display='';}
async function doLogin(){const id=(document.getElementById('li-id').value||'').trim(),pw=document.getElementById('li-pw').value;const err=document.getElementById('li-e');err.style.display='none';if(!id||!pw){err.textContent='Заполните поля';err.style.display='';return;}const btn=document.getElementById('li-b');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';try{const data=await POST('/auth/login',{id,password:pw});token=data.token;me=data.user;localStorage.setItem('knb_t',token);localStorage.setItem('knb_me',JSON.stringify(me));await loadAll();CM('m-auth');render();connectWS();}catch(e){err.textContent=e.message;err.style.display='';}btn.disabled=false;btn.innerHTML='Войти';}
async function doReg(){const email=(document.getElementById('rg-em').value||'').trim(),name=(document.getElementById('rg-nm').value||'').trim(),username=(document.getElementById('rg-un').value||'').trim(),password=document.getElementById('rg-pw').value,bio=(document.getElementById('rg-bi').value||'').trim();const err=document.getElementById('rg-e');err.style.display='none';if(!email||!name||!username||!password){err.textContent='Заполните поля';err.style.display='';return;}if(password.length<6){err.textContent='Пароль минимум 6 символов';err.style.display='';return;}const btn=document.getElementById('rg-b');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';let avatar='';try{const f=document.getElementById('rg-av').files[0];if(f)avatar=await rf(f);}catch{}try{const data=await POST('/auth/register',{email,password,name,username,bio,avatar});token=data.token;me=data.user;localStorage.setItem('knb_t',token);localStorage.setItem('knb_me',JSON.stringify(me));await loadAll();CM('m-auth');render();connectWS();}catch(e){err.textContent=e.message;err.style.display='';}btn.disabled=false;btn.innerHTML='Зарегистрироваться';}
async function doLogout(){token=null;me=null;localStorage.removeItem('knb_t');localStorage.removeItem('knb_me');allUsers=[];allPosts=[];allComms=[];allFriends=[];allNotifs=[];allGroups=[];allStories=[];commMembers={};onlineUsers=new Set();clearInterval(refreshTimer);if(ws){try{ws.close();}catch{}ws=null;}endCall();PAGE='feed';chatId=null;closeStoryViewer();render();}

// EVENTS
document.querySelectorAll('.ni[data-p]').forEach(btn=>{btn.addEventListener('click',()=>{const p=btn.dataset.p;if(!me&&p!=='feed'){OM('m-auth');showLi();return;}goPage(p);});});
document.getElementById('mtog').addEventListener('click',()=>document.getElementById('lnav').classList.toggle('open'));
document.addEventListener('click',e=>{if(window.innerWidth<=640){const n=document.getElementById('lnav'),t=document.getElementById('mtog');if(n&&t&&!n.contains(e.target)&&!t.contains(e.target))n.classList.remove('open');}});
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.mo.open').forEach(m=>m.classList.remove('open'));CM('cv');CM('iv');closeModal();closeStoryViewer();if(document.getElementById('callscr').classList.contains('active'))endCall();}});
document.getElementById('li-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// INIT
async function init(){if(localStorage.getItem('knb_theme')==='light')document.body.classList.add('light');initSearch();if(!token){render();return;}try{const s=localStorage.getItem('knb_me');if(s)me=JSON.parse(s);}catch{}render();try{await loadAll();me=allUsers.find(u=>u.id===me?.id)||me;if(me){localStorage.setItem('knb_me',JSON.stringify(me));connectWS();}render();}catch{token=null;localStorage.removeItem('knb_t');localStorage.removeItem('knb_me');me=null;render();}}
init();
</script></body></html>

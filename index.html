<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KNB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--card:#161923;--border:#252a38;--txt:#e8eaf0;--txt2:#6b7280;--blue:#4f8ef7;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7}
.light{--bg:#f0f2f7;--bg2:#fff;--bg3:#e8ecf4;--card:#fff;--border:#d1d9e8;--txt:#0d1117;--txt2:#6b7280}
body{background:var(--bg);color:var(--txt);font-family:'Manrope',sans-serif;min-height:100vh}
/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.25rem;height:60px;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:100}
.logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:1.25rem;color:var(--blue);letter-spacing:-1px;white-space:nowrap;flex-shrink:0}
.logo span{color:var(--txt)}
.sw{flex:1;max-width:380px;position:relative}
.sw i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt2);font-size:.85rem;pointer-events:none}
#si{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:.5rem 1rem .5rem 2.2rem;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.9rem;outline:none;transition:.2s}
#si:focus{border-color:var(--blue)}
/* Живой поиск дропдаун */
#srp{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;z-index:300;display:none;box-shadow:0 12px 40px rgba(0,0,0,.5)}
#srp.open{display:block}
.srp-item{display:flex;align-items:center;gap:.65rem;padding:.7rem 1rem;cursor:pointer;transition:.15s}
.srp-item:hover{background:var(--bg3)}
.srp-item img{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--bg3)}
.srp-item .si-name{font-weight:700;font-size:.875rem}
.srp-item .si-sub{color:var(--txt2);font-size:.75rem}
.srp-sep{padding:.4rem 1rem;font-size:.72rem;font-weight:700;color:var(--txt2);background:var(--bg3);letter-spacing:.5px}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.hbtn{background:none;border:none;color:var(--txt2);width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;position:relative;transition:.2s}
.hbtn:hover{background:var(--bg3);color:var(--txt)}
.hava{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--blue);transition:.2s}
.hava:hover{opacity:.85}
.bdg{position:absolute;top:3px;right:3px;background:var(--red);color:#fff;font-size:.58rem;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}
.mtog{display:none;background:none;border:none;color:var(--txt);font-size:1.2rem;cursor:pointer;padding:.4rem;flex-shrink:0}
/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 60px)}
.lnav{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:.75rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:.2rem}
.ni{display:flex;align-items:center;gap:.85rem;padding:.7rem 1rem;border-radius:12px;cursor:pointer;color:var(--txt2);font-weight:600;font-size:.88rem;transition:.15s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bg3);color:var(--txt)}
.ni.active{background:var(--blue);color:#fff}
.ni i{width:18px;font-size:.95rem;flex-shrink:0}
.nsep{height:1px;background:var(--border);margin:.4rem 0}
.center{flex:1;max-width:700px;padding:1.25rem 1rem;min-width:0}
.rp{width:280px;flex-shrink:0;padding:1.25rem .75rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
.rpb{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem}
.rpt{font-family:'Unbounded',sans-serif;font-size:.72rem;font-weight:700;color:var(--txt2);letter-spacing:1px;margin-bottom:.85rem}
.supp-item{display:flex;align-items:center;gap:.55rem;padding:.5rem .65rem;border-radius:10px;cursor:pointer;font-size:.84rem;font-weight:600;transition:.15s}
.supp-item:hover{background:var(--bg3);color:var(--blue)}
/* TOAST */
#tw{position:fixed;top:70px;right:1.25rem;z-index:9999;display:flex;flex-direction:column;gap:.45rem;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:.7rem 1.1rem;font-size:.85rem;font-weight:600;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:tin .25s ease;pointer-events:all;display:flex;align-items:center;gap:.5rem}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--blue);color:var(--blue)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
/* CONFIRM */
#cv{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:800;display:none;align-items:center;justify-content:center}
#cv.open{display:flex}
#cb{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.75rem;max-width:340px;width:92%;text-align:center}
#cb h3{font-family:'Unbounded',sans-serif;font-size:.95rem;margin-bottom:.6rem}
#cb p{color:var(--txt2);font-size:.88rem;margin-bottom:1.4rem;line-height:1.5}
#cb .row{display:flex;gap:.6rem;justify-content:center}
/* INPUT DIALOG */
#iv{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:800;display:none;align-items:center;justify-content:center}
#iv.open{display:flex}
#ib{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.75rem;max-width:380px;width:92%}
#ib h3{font-family:'Unbounded',sans-serif;font-size:.95rem;margin-bottom:1rem}
#idialog-inp{width:100%;padding:.7rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.9rem;outline:none;margin-bottom:1rem}
#idialog-inp:focus{border-color:var(--blue)}
#ib .row{display:flex;gap:.6rem}
/* POSTS */
.pc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.1rem;margin-bottom:.85rem;transition:.2s}
.pc:hover{border-color:rgba(79,142,247,.4)}
.ph{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem;cursor:pointer}
.ava{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--bg3);flex-shrink:0;position:relative}
.avsm{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--bg3);flex-shrink:0;position:relative}
.pan{font-weight:700;font-size:.92rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.pm{color:var(--txt2);font-size:.78rem;margin-top:.1rem}
.vc{color:var(--blue);font-size:.82rem}
.ptxt{line-height:1.6;word-break:break-word;margin-bottom:.65rem;font-size:.92rem}
.pimg{width:100%;border-radius:12px;max-height:400px;object-fit:cover;margin-bottom:.65rem;cursor:pointer;display:block}
.pact{display:flex;gap:.4rem;border-top:1px solid var(--border);padding-top:.65rem;flex-wrap:wrap}
.ab{background:none;border:none;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:.35rem;font-size:.83rem;font-family:'Manrope',sans-serif;padding:.35rem .65rem;border-radius:20px;transition:.15s;font-weight:600}
.ab:hover{background:var(--bg3)}.ab.liked{color:var(--red)}.ab.db:hover{background:rgba(239,68,68,.12);color:var(--red)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.45rem;padding:.55rem 1.1rem;border-radius:24px;border:none;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:700;font-size:.88rem;transition:.15s;white-space:nowrap}
.bp{background:var(--blue);color:#fff}.bp:hover{opacity:.85}
.bs{background:var(--bg3);color:var(--txt);border:1px solid var(--border)}.bs:hover{border-color:var(--blue)}
.bd{background:var(--red);color:#fff}.bd:hover{opacity:.85}
.bg2c{background:var(--green);color:#fff}.bg2c:hover{opacity:.85}
.bsm{padding:.3rem .75rem;font-size:.8rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* FORMS */
.fg{margin-bottom:.9rem}
.fg label{display:block;font-size:.83rem;font-weight:600;color:var(--txt2);margin-bottom:.35rem}
.fg input,.fg textarea,.fg select{width:100%;padding:.65rem .9rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none;transition:.2s;resize:vertical}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--blue)}
.ferr{color:var(--red);font-size:.82rem;margin-top:.35rem;display:none}
/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center}
.mo.open{display:flex}
.mb{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:1.75rem;width:92%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative}
.mb h2{font-family:'Unbounded',sans-serif;font-size:1rem;margin-bottom:1.25rem}
.mc{position:absolute;top:.9rem;right:.9rem;background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:.15s}
.mc:hover{background:var(--red);color:#fff}
/* PROFILE */
.pban{height:160px;border-radius:16px 16px 0 0;background:linear-gradient(135deg,var(--blue),var(--purple));background-size:cover;background-position:center;margin:-1px -1px 0}
.paw{padding:0 1.25rem;margin-top:-42px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:.85rem}
.pava{width:84px;height:84px;border-radius:50%;border:4px solid var(--bg2);object-fit:cover;background:var(--bg3)}
.pinfo{padding:0 1.25rem 1.25rem}
.pname{font-family:'Unbounded',sans-serif;font-size:1.05rem;font-weight:900;display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.puname{color:var(--txt2);font-size:.82rem;margin-top:.2rem}
.pbio{margin:.65rem 0;line-height:1.6;font-size:.9rem}
/* ONLINE */
.online-dot{width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg2);position:absolute;bottom:0;right:0;flex-shrink:0}
.online-dot.off{background:var(--txt2)}
/* CHAT */
.cw{display:flex;flex-direction:column;height:calc(100vh - 145px);max-height:700px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--card)}
.chdr{padding:.75rem 1.1rem;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.typing-bar{padding:.3rem 1.1rem;font-size:.78rem;color:var(--txt2);background:var(--bg2);min-height:26px;font-style:italic;border-bottom:1px solid var(--border);transition:.2s}
.cmsg{flex:1;overflow-y:auto;padding:.85rem;display:flex;flex-direction:column;gap:.55rem}
.mw{display:flex;flex-direction:column}
.mw.me{align-items:flex-end}.mw.them{align-items:flex-start}
.msg{max-width:74%;padding:.6rem .95rem;border-radius:18px;font-size:.88rem;line-height:1.5;position:relative;word-break:break-word}
.msg.them{background:var(--bg3);border-radius:18px 18px 18px 4px}
.msg.me{background:var(--blue);color:#fff;border-radius:18px 18px 4px 18px}
.mauth{font-size:.7rem;font-weight:700;margin-bottom:.2rem;color:var(--txt2)}
.mtime{font-size:.66rem;opacity:.55;margin-top:.2rem}
.mdel{position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.mw:hover .mdel{display:flex}
.mimg{max-width:200px;border-radius:10px;cursor:pointer;display:block;margin-top:.3rem}
.mvoice{display:flex;align-items:center;gap:.5rem;padding:.3rem .5rem;background:rgba(0,0,0,.1);border-radius:18px;margin-top:.3rem}
.mvoice audio{height:26px;max-width:170px}
.ciw{padding:.65rem .85rem;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:.45rem;align-items:center}
.cim{flex:1;display:flex;align-items:center;gap:.35rem;background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:.35rem .65rem .35rem .9rem;transition:.2s}
.cim:focus-within{border-color:var(--blue)}
.cim input{flex:1;background:none;border:none;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none}
.cib{background:none;border:none;color:var(--txt2);cursor:pointer;padding:.2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.15s;font-size:.95rem;width:28px;height:28px}
.cib:hover{color:var(--blue)}.cib.rec{color:var(--red)!important;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sbtn{background:var(--blue);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;transition:.15s}
.sbtn:hover{opacity:.85}
/* ADMIN */
.atabs{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1.25rem;border-bottom:2px solid var(--border);padding-bottom:.65rem}
.at{background:none;border:none;padding:.45rem .85rem;border-radius:10px;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:600;font-size:.82rem;color:var(--txt2);transition:.15s}
.at.active{background:var(--blue);color:#fff}.at:hover:not(.active){background:var(--bg3);color:var(--txt)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.65rem;margin-bottom:1.25rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.85rem;text-align:center}
.sv{font-family:'Unbounded',sans-serif;font-size:1.5rem;font-weight:900;margin-bottom:.15rem}
.sl{font-size:.7rem;color:var(--txt2)}
/* USERS / COMMS */
.ur{display:flex;align-items:center;gap:.65rem;padding:.65rem;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:.45rem;flex-wrap:wrap}
.uri{flex:1;min-width:0}
.uri .un{font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.uri .us{color:var(--txt2);font-size:.76rem}
.ura{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}
.fr{display:flex;align-items:center;gap:.65rem;padding:.55rem .65rem;border-radius:10px;cursor:pointer;transition:.15s}
.fr:hover{background:var(--bg3)}
.cc{display:flex;align-items:center;gap:.85rem;padding:.9rem;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:.65rem;cursor:pointer;transition:.2s}
.cc:hover{border-color:var(--blue)}
.cca{width:52px;height:52px;border-radius:12px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.ni2{padding:.8rem;border-bottom:1px solid var(--border);display:flex;gap:.65rem;align-items:flex-start}
.ni2:last-child{border-bottom:none}
.nd{width:8px;height:8px;background:var(--blue);border-radius:50%;margin-top:5px;flex-shrink:0}
.nd.r{background:transparent;border:1px solid var(--border)}
.wlc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:.85rem}
.wlc h1{font-family:'Unbounded',sans-serif;font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wlc p{color:var(--txt2);max-width:340px;line-height:1.6;font-size:.92rem}
.tag{display:inline-flex;align-items:center;gap:.25rem;padding:.12rem .55rem;border-radius:20px;font-size:.7rem;font-weight:700}
.tb{background:rgba(79,142,247,.15);color:var(--blue)}
/* CALL */
.callscr{position:fixed;inset:0;background:#000;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center}
.callscr.active{display:flex}
#vrem{width:100%;height:100%;object-fit:cover;position:absolute}
#vloc{position:absolute;top:1rem;right:1rem;width:110px;height:82px;border-radius:10px;object-fit:cover;border:2px solid var(--blue);background:#111}
.callui{position:relative;z-index:2;text-align:center;background:rgba(0,0,0,.45);padding:1.75rem 2.5rem;border-radius:22px;backdrop-filter:blur(12px)}
.callname{font-family:'Unbounded',sans-serif;font-size:1.4rem;color:#fff;margin-bottom:.4rem}
.callst{color:rgba(255,255,255,.65);margin-bottom:1.75rem;font-size:.9rem}
.callbtns{display:flex;gap:1.25rem;justify-content:center}
.cb{width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:.15s}
.cb:hover{transform:scale(1.08)}.cb.end{background:var(--red);color:#fff}.cb.ctrl{background:rgba(255,255,255,.18);color:#fff}.cb.muted{background:var(--red);color:#fff}
.inc{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:1.1rem 1.35rem;z-index:900;display:none;flex-direction:column;gap:.65rem;min-width:270px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.inc.show{display:flex}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:800;display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:900px){.rp{display:none}}
@media(max-width:640px){.lnav{position:fixed;top:60px;left:0;bottom:0;z-index:200;transform:translateX(-100%);transition:.25s;width:220px}.lnav.open{transform:translateX(0)}.mtog{display:block}.center{padding:1rem .5rem}}
</style>
</head>
<body>
<div id="tw"></div>
<!-- CONFIRM -->
<div id="cv"><div id="cb"><h3 id="cv-t">Подтверждение</h3><p id="cv-m"></p><div class="row"><button class="btn bs bsm" id="cv-n">Отмена</button><button class="btn bd bsm" id="cv-y">Подтвердить</button></div></div></div>
<!-- INPUT DIALOG -->
<div id="iv"><div id="ib"><h3 id="iv-t">Введите</h3><input id="idialog-inp" type="text"><div class="row"><button class="btn bs bsm" id="iv-n">Отмена</button><button class="btn bp bsm" id="iv-y">OK</button></div></div></div>
<header>
  <button class="mtog" id="mtog"><i class="fas fa-bars"></i></button>
  <div class="logo">KNB<span>.</span></div>
  <div class="sw">
    <i class="fas fa-search"></i>
    <input id="si" autocomplete="off" placeholder="Поиск людей, постов...">
    <div id="srp"></div>
  </div>
  <div class="hdr-r" id="hdr-r"></div>
</header>
<div class="layout">
  <nav class="lnav" id="lnav">
    <button class="ni active" data-p="feed"><i class="fas fa-home"></i> Главная</button>
    <button class="ni" data-p="profile"><i class="fas fa-user"></i> Профиль</button>
    <button class="ni" data-p="friends"><i class="fas fa-user-friends"></i> Друзья</button>
    <button class="ni" data-p="messages"><i class="fas fa-envelope"></i> Сообщения</button>
    <button class="ni" data-p="communities"><i class="fas fa-users"></i> Сообщества</button>
    <button class="ni" data-p="forum" id="forumbtn" onclick="goForum()" style="display:none"><i class="fas fa-comments"></i> Форум</button>
    <button class="ni" data-p="complaints" id="compbtn" onclick="goComplaints()" style="display:none"><i class="fas fa-flag"></i> Жалобы</button>
    <button class="ni" data-p="notifications"><i class="fas fa-bell"></i> Уведомления</button>
    <div class="nsep"></div>
    <button class="ni" data-p="settings"><i class="fas fa-cog"></i> Настройки</button>
    <button class="ni" data-p="admin" id="admbtn" style="display:none"><i class="fas fa-shield-alt"></i> Админ</button>
  </nav>
  <main class="center" id="cnt"></main>
  <aside class="rp">
    <div class="rpb"><div class="rpt">Онлайн</div><div id="rps"></div></div>
    <div class="rpb">
      <div class="rpt">Поддержка</div>
      <div style="display:flex;flex-direction:column;gap:.5rem">

<script>
// KNB — полный клиент
const API = '/api';
const WS_URL = (location.protocol==='https:'?'wss://':'ws://')+location.host;
const OWNER_EMAIL = 'foxi@knb.com';

// ── Состояние ─────────────────────────────────────
let me=null, token=localStorage.getItem('knb_token')||null;
let PAGE='feed', ADMTAB='overview', chatId=null, cmtPostId=null, postCommId=null;
let ws=null, localStream=null, pc=null, callFrom=null, callType=null, pendingCall=null;
let muted=false, camOff=false, mrec=null, mrChunks=[], voiceCid=null;
let allUsers=[], allPosts=[], allComms=[], allFriendships=[], allNotifs=[], allGroups=[];
let commMembers={}, onlineUsers=new Set();
let typingTimers={}, typingSendTimer=null;
const STUN={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};

const RANKS={
  owner:    {label:'Владелец', color:'#f59e0b',icon:'👑',canPost:true, canManage:true},
  admin:    {label:'Админ',    color:'#ef4444',icon:'🛡',canPost:true, canManage:true},
  moderator:{label:'Модератор',color:'#a855f7',icon:'⚡',canPost:true, canManage:false},
  member:   {label:'Участник', color:'#6b7280',icon:'👤',canPost:false,canManage:false},
};

// ── Toast (без alert) ──────────────────────────────
function toast(msg, type='info', dur=3500){
  const w=document.getElementById('toast-wrap');
  const icons={ok:'✅',err:'❌',info:'ℹ️'};
  const d=document.createElement('div');
  d.className=`toast ${type}`;
  d.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;
  w.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transform='translateX(20px)';setTimeout(()=>d.remove(),300);},dur);
}

// ── Confirm (без confirm()) ───────────────────────
function showConfirm(title, text, onYes, yesLabel='Подтвердить', yesCls='bd'){
  const w=document.getElementById('confirm-wrap');
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-text').textContent=text;
  const yb=document.getElementById('confirm-yes');
  const nb=document.getElementById('confirm-no');
  yb.textContent=yesLabel; yb.className=`btn ${yesCls}`;
  w.classList.add('open');
  const close=()=>w.classList.remove('open');
  yb.onclick=()=>{close();onYes();};
  nb.onclick=close;
}

// ── Input dialog (без prompt()) ───────────────────
function showInput(title, fields, onOk){
  // fields: [{id,label,type,value,placeholder}]
  const w=document.getElementById('input-wrap');
  document.getElementById('input-title').textContent=title;
  const fw=document.getElementById('input-field-wrap');
  fw.innerHTML=fields.map(f=>`
    <div style="margin-bottom:.75rem">
      ${f.label?`<label style="display:block;font-size:.83rem;color:var(--txt2);margin-bottom:.3rem">${esc(f.label)}</label>`:''}
      ${f.type==='textarea'
        ?`<textarea id="inp_${f.id}" placeholder="${esc(f.placeholder||'')}" rows="3" style="width:100%;padding:.65rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.9rem;outline:none;resize:vertical">${esc(f.value||'')}</textarea>`
        :`<input id="inp_${f.id}" type="${f.type||'text'}" placeholder="${esc(f.placeholder||'')}" value="${esc(f.value||'')}" style="width:100%;padding:.65rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.9rem;outline:none">`
      }
    </div>`).join('');
  w.classList.add('open');
  const close=()=>w.classList.remove('open');
  document.getElementById('input-yes').onclick=()=>{
    const vals={};
    fields.forEach(f=>{
      const el=document.getElementById('inp_'+f.id);
      if(el) vals[f.id]=(el.value||'').trim();
    });
    const first=Object.values(vals)[0];
    if(!first){toast('Заполните поле','err');return;}
    close(); onOk(vals);
  };
  document.getElementById('input-no').onclick=close;
  setTimeout(()=>{ const el=document.getElementById('inp_'+fields[0].id); if(el) el.focus(); },50);
}

// ── API ───────────────────────────────────────────
async function api(method, path, body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token) opts.headers['Authorization']='Bearer '+token;
  if(body!==undefined) opts.body=JSON.stringify(body);
  let r;
  try{ r=await fetch(API+path,opts); }catch{ throw new Error('Нет соединения с сервером'); }
  let data; try{ data=await r.json(); }catch{ data={}; }
  if(!r.ok) throw new Error(data.error||'Ошибка '+r.status);
  return data;
}
const GET=(p)=>api('GET',p);
const POST=(p,b)=>api('POST',p,b);
const PUT=(p,b)=>api('PUT',p,b);
const DEL=(p)=>api('DELETE',p);

async function loadAll(){
  if(!token) return;
  try{
    const [u,p,c,f,n,g]=await Promise.all([
      GET('/users'), GET('/posts'), GET('/communities'),
      GET('/friendships'), GET('/notifications'), GET('/groups').catch(()=>[])
    ]);
    allUsers=u||[]; allPosts=p||[]; allComms=c||[];
    allFriendships=f||[]; allNotifs=n||[]; allGroups=g||[];
  }catch(e){ console.error('loadAll:',e.message); }
}

// ── Утилиты ───────────────────────────────────────
const fu=id=>allUsers.find(u=>u.id===id);
const fc=id=>allComms.find(c=>c.id===id);
const isOwner=()=>me&&me.email===OWNER_EMAIL;
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ago(ts){
  const d=(Date.now()-new Date(ts))/1000;
  if(d<60) return 'только что';
  if(d<3600) return Math.floor(d/60)+' мин.';
  if(d<86400) return Math.floor(d/3600)+' ч.';
  return new Date(ts).toLocaleDateString('ru-RU');
}
function ava(n){ return 'https://ui-avatars.com/api/?name='+encodeURIComponent(n||'?')+'&background=4f8ef7&color=fff&size=80'; }
function rf(f){ return new Promise((res,rej)=>{const r=new FileReader;r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(f);}); }
function OM(id){const el=document.getElementById(id);if(el)el.classList.add('open');}
function CM(id){const el=document.getElementById(id);if(el)el.classList.remove('open');}
function openLB(src){document.getElementById('lb-img').src=src;document.getElementById('lb').classList.add('open');}
function toggleTheme(){document.body.classList.toggle('light');}
function rankBadge(rank){
  const r=RANKS[rank]; if(!r||rank==='member') return '';
  return `<span style="font-size:.7rem;font-weight:700;color:${r.color}">${r.icon} ${r.label}</span>`;
}
function odot(uid, big=false){
  const on=onlineUsers.has(uid);
  const sz=big?'14px':'10px';
  return `<span class="odot${on?'':' off'}" style="width:${sz};height:${sz}"></span>`;
}
function getMemberRank(commId,uid){
  const c=fc(commId); if(c&&c.createdBy===uid) return 'owner';
  const m=(commMembers[commId]||[]).find(x=>x.uid===uid);
  return m?(m.rank||'member'):null;
}
function canPostInComm(commId){
  if(!me) return false;
  if(isOwner()) return true;
  const c=fc(commId); if(c&&c.createdBy===me.id) return true;
  const r=getMemberRank(commId,me.id);
  return r&&RANKS[r]&&RANKS[r].canPost;
}
function canManageComm(commId){
  if(!me) return false;
  if(isOwner()) return true;
  const c=fc(commId); if(c&&c.createdBy===me.id) return true;
  const r=getMemberRank(commId,me.id);
  return r&&RANKS[r]&&RANKS[r].canManage;
}
function cid2(a,b){return 'chat_'+[a,b].sort().join('_');}
function mediaHtml(media){
  if(!media) return '';
  const url=media.url||media, t=media.t||'';
  if(t.startsWith('video')) return `<video class="pimg" controls src="${url}"></video>`;
  return `<img class="pimg" src="${url}" onclick="openLB(this.src)" onerror="this.style.display='none'">`;
}

// ── WebSocket ──────────────────────────────────────
function connectWS(){
  if(!token) return;
  try{ ws=new WebSocket(WS_URL); }catch{ setTimeout(connectWS,4000); return; }
  ws.onopen=()=>ws.send(JSON.stringify({type:'auth',token}));
  ws.onmessage=e=>{
    let m; try{m=JSON.parse(e.data);}catch{return;}
    if(m.type==='authed') {}
    if(m.type==='online_list'){ onlineUsers=new Set(m.users||[]); renderRP(); renderHdr(); }
    if(m.type==='user_online'){ onlineUsers.add(m.uid); renderRP(); }
    if(m.type==='user_offline'){ onlineUsers.delete(m.uid); renderRP(); }
    if(m.type==='new_post'){ allPosts.unshift(m.post); if(PAGE==='feed') renderPage(); }
    if(m.type==='new_message'&&chatId&&m.message.chatId===chatId) appendMsg(m.message);
    if(m.type==='notification'){
      allNotifs.unshift({id:'_'+Date.now(),uid:me?.id,text:m.text,read:false,ts:m.ts||new Date().toISOString()});
      renderHdr(); renderRP();
      toast(m.text,'info');
    }
    if(m.type==='typing') showTyping(m.chatId,m.name);
    if(m.type==='call_incoming'){pendingCall=m;showIncoming(m);}
    if(m.type==='call_answer'&&pc) pc.setRemoteDescription(new RTCSessionDescription(m.answer)).catch(()=>{});
    if(m.type==='call_ice'&&pc) pc.addIceCandidate(new RTCIceCandidate(m.candidate)).catch(()=>{});
    if(m.type==='call_rejected'){document.getElementById('cs-st').textContent='Звонок отклонён';setTimeout(endCall,1500);}
    if(m.type==='call_ended') endCall();
    if(m.type==='banned'){toast('🚫 Аккаунт заблокирован','err');doLogout();}
    if(m.type==='verified'){if(me){me.verified=true;renderHdr();}}
    if(m.type==='friend_request'||m.type==='friend_accepted'){
      loadAll().then(()=>{renderPage();renderRP();});
    }
  };
  ws.onclose=()=>setTimeout(connectWS,3000);
  ws.onerror=()=>{};
}
function wsSend(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));}

// Индикатор "печатает"
let typingState={};
function showTyping(cId, name){
  const el=document.getElementById('typing-bar');
  if(!el||chatId!==cId) return;
  el.textContent=`${name||'Кто-то'} печатает...`;
  clearTimeout(typingTimers[cId]);
  typingTimers[cId]=setTimeout(()=>{const el=document.getElementById('typing-bar');if(el)el.textContent='';},3000);
}
function sendTypingEvent(cId){
  clearTimeout(typingSendTimer);
  typingSendTimer=setTimeout(()=>wsSend({type:'typing',chatId:cId}),300);
}

// ── Поиск (живой дропдаун) ────────────────────────
let searchDebounce=null;
function initSearch(){
  const si=document.getElementById('si');
  const srp=document.getElementById('srp');
  si.addEventListener('input',e=>{
    const q=(e.target.value||'').trim();
    clearTimeout(searchDebounce);
    if(q.length<2){srp.classList.remove('open');srp.innerHTML='';return;}
    searchDebounce=setTimeout(()=>doSearch(q),200);
  });
  si.addEventListener('keydown',e=>{if(e.key==='Escape'){srp.classList.remove('open');si.value='';}});
  document.addEventListener('click',e=>{if(!si.contains(e.target)&&!srp.contains(e.target))srp.classList.remove('open');});
}
function doSearch(q){
  if(!me) return;
  const srp=document.getElementById('srp');
  const ql=q.toLowerCase();
  const users=allUsers.filter(u=>u.name.toLowerCase().includes(ql)||u.username.toLowerCase().includes(ql)).slice(0,4);
  const comms=allComms.filter(c=>c.name.toLowerCase().includes(ql)).slice(0,3);
  if(!users.length&&!comms.length){srp.classList.remove('open');return;}
  let h='';
  if(users.length){
    h+=`<div style="padding:.5rem 1rem .25rem;font-size:.72rem;font-weight:700;color:var(--txt2);text-transform:uppercase">Люди</div>`;
    h+=users.map(u=>`<div class="sri" onclick="srp.classList.remove('open');viewUser('${u.id}')">
      <div style="position:relative;display:inline-flex">
        <img src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">
        ${odot(u.id)}
      </div>
      <div><div style="font-weight:600">${esc(u.name)}${u.verified?' <i class="fas fa-check-circle" style="color:var(--blue);font-size:.75rem"></i>':''}</div>
      <div style="color:var(--txt2);font-size:.75rem">${esc(u.username)}</div></div>
    </div>`).join('');
  }
  if(comms.length){
    h+=`<div style="padding:.5rem 1rem .25rem;font-size:.72rem;font-weight:700;color:var(--txt2);text-transform:uppercase">Сообщества</div>`;
    h+=comms.map(c=>`<div class="sri" onclick="srp.classList.remove('open');viewComm('${c.id}')">
      <img src="${c.avatar||ava(c.name)}" style="border-radius:8px" onerror="this.src='${ava(c.name)}'">
      <div><div style="font-weight:600">${esc(c.name)}</div></div>
    </div>`).join('');
  }
  srp.innerHTML=h;
  srp.classList.add('open');
}

// ── Render ────────────────────────────────────────
function render(){renderHdr();renderNav();renderRP();renderPage();}

function renderHdr(){
  const el=document.getElementById('hdr-r'); if(!el) return;
  if(!me){el.innerHTML=`<button class="btn bp bsm" onclick="OM('m-auth');showLi()">Войти</button>`;return;}
  const ns=allNotifs.filter(n=>!n.read).length;
  el.innerHTML=`
    <button class="hbtn" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i></button>
    <button class="hbtn" onclick="goPage('notifications')" style="position:relative">
      <i class="fas fa-bell"></i>${ns?`<span class="bdg">${ns}</span>`:''}
    </button>
    <div style="position:relative;cursor:pointer" onclick="goPage('profile')">
      <img class="hava" src="${me.avatar||ava(me.name)}" onerror="this.src='${ava(me.name)}'" title="${esc(me.name)}">
      ${odot(me.id)}
    </div>`;
}

function renderNav(){
  document.querySelectorAll('.ni[data-p]').forEach(b=>b.classList.toggle('active',b.dataset.p===PAGE));
  const fb=document.getElementById('forumbtn');if(fb)fb.style.display=me?'flex':'none';
  const cb=document.getElementById('compbtn');if(cb)cb.style.display=me?'flex':'none';
  const ab=document.getElementById('admbtn'); if(ab) ab.style.display=isOwner()?'flex':'none';
}

function renderRP(){
  const rps=document.getElementById('rps'), rpn=document.getElementById('rpn');
  if(!me||!rps) return;
  const online=allUsers.filter(u=>u.id!==me.id&&onlineUsers.has(u.id)).slice(0,5);
  const offline=allUsers.filter(u=>u.id!==me.id&&!onlineUsers.has(u.id)&&(me.friends||[]).includes(u.id)).slice(0,3);
  const list=[...online,...offline].slice(0,8);
  rps.innerHTML=list.map(u=>`<div class="fr" onclick="viewUser('${u.id}')">
    <div style="position:relative">
      <img class="avsm" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">
      ${odot(u.id)}
    </div>
    <div>
      <div style="font-weight:700;font-size:.84rem">${esc(u.name)}</div>
      <div style="color:${onlineUsers.has(u.id)?'var(--green)':'var(--txt2)'};font-size:.72rem">${onlineUsers.has(u.id)?'● онлайн':'○ офлайн'}</div>

function renderPage(){

      <p>Социальная сеть нового поколения. Общайся, создавай сообщества, звони друзьям.</p>

function goPage(p){

// ── ЛЕНТА ─────────────────────────────────────────
function renderFeed(){
  const c=document.getElementById('cnt');
  let h=`<button class="btn bp" onclick="openPostModal()" style="margin-bottom:1rem"><i class="fas fa-plus"></i> Создать пост</button>`;
  const sorted=[...allPosts].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  if(!sorted.length){c.innerHTML=h+`<p style="color:var(--txt2);text-align:center;padding:3rem 0">Нет постов. Будь первым! 🚀</p>`;return;}
  sorted.forEach(p=>{
    const isComm=!!p.communityId;
    const au=isComm?fc(p.communityId):fu(p.authorId);
    if(!au) return;
    const liked=(p.likes||[]).includes(me.id);
    const canDel=isOwner()||p.authorId===me.id;
    const rank=isComm?getMemberRank(p.communityId,p.authorId):null;
    h+=`<div class="pc">
      <div class="ph" onclick="${isComm?`viewComm('${p.communityId}')`:`viewUser('${p.authorId}')`}">
        <div class="ava-wrap">
          <img class="ava" src="${au.avatar||ava(au.name)}" onerror="this.src='${ava(au.name)}'">
          ${!isComm?odot(p.authorId):''}
        </div>
        <div>
          <div class="pan">${esc(au.name)}${au.verified?'<i class="fas fa-check-circle vc"></i>':''}${rank&&rank!=='member'?' '+rankBadge(rank):''}</div>
          <div class="pm">${isComm?'<i class="fas fa-users" style="font-size:.7rem"></i> · ':''}${ago(p.ts)}</div>
        </div>
      </div>
      ${p.text?`<div class="ptxt">${esc(p.text)}</div>`:''}
      ${mediaHtml(p.media)}
      <div class="pact">
        <button class="ab${liked?' liked':''}" onclick="likePost('${p.id}')"><i class="fas fa-heart"></i> ${(p.likes||[]).length}</button>
        <button class="ab" onclick="showCmts('${p.id}')"><i class="fas fa-comment"></i> ${(p.comments||[]).length}</button>
        ${canDel?`<button class="ab db" onclick="confirmDel('Удалить пост?','',()=>delPost('${p.id}'))"><i class="fas fa-trash"></i></button>`:''}
      </div>
    </div>`;
  });
  c.innerHTML=h;
}

function openPostModal(cid=null){
  postCommId=cid;
  const cw=document.getElementById('pt-cw');
  if(cid&&cw){const c=fc(cid);cw.style.display='';document.getElementById('pt-cn').textContent=c?c.name:'';}
  else if(cw) cw.style.display='none';
  const tx=document.getElementById('pt-tx'), mf=document.getElementById('pt-mf');
  if(tx)tx.value='';if(mf)mf.value='';
  OM('m-post');
}

async function publishPost(){
  const text=(document.getElementById('pt-tx').value||'').trim();
  const file=document.getElementById('pt-mf').files[0];
  if(!text&&!file){toast('Добавьте текст или медиа','err');return;}
  const btn=document.getElementById('pt-b');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  let media=null;
  if(file){try{media={url:await rf(file),t:file.type};}catch{toast('Ошибка файла','err');btn.disabled=false;btn.innerHTML='Опубликовать';return;}}
  try{
    const post=await POST('/posts',{text,media,communityId:postCommId||undefined});
    allPosts.unshift(post);CM('m-post');postCommId=null;renderPage();toast('Пост опубликован','ok');
  }catch(e){toast(e.message,'err');}
  btn.disabled=false;btn.innerHTML='Опубликовать';
}

async function likePost(pid){
  try{const upd=await POST('/posts/'+pid+'/like');const i=allPosts.findIndex(p=>p.id===pid);if(i>=0)allPosts[i]=upd;renderPage();}
  catch(e){toast(e.message,'err');}
}

async function delPost(pid){
  try{await DEL('/posts/'+pid);allPosts=allPosts.filter(p=>p.id!==pid);renderPage();toast('Пост удалён','ok');}
  catch(e){toast(e.message,'err');}
}

// Хелпер для confirmDel
function confirmDel(title,text,cb){showConfirm(title,text,cb,'Удалить','bd');}

// ── КОММЕНТАРИИ ───────────────────────────────────
function showCmts(pid){

function drawCmts(p){

      <div style="flex:1;background:var(--bg3);border-radius:12px;padding:.5rem .75rem">

async function addCmt(){
  const inp=document.getElementById('cmt-i');
  const text=(inp.value||'').trim(); if(!text||!cmtPostId) return;
  try{
    const upd=await POST('/posts/'+cmtPostId+'/comment',{text});
    const i=allPosts.findIndex(p=>p.id===cmtPostId);if(i>=0)allPosts[i]=upd;
    drawCmts(upd); inp.value='';
  }catch(e){toast(e.message,'err');}
}

async function delCmt(pid,cid){
  try{
    const upd=await DEL('/posts/'+pid+'/comment/'+cid);

    drawCmts(upd); toast('Комментарий удалён','ok');
  }catch(e){toast(e.message,'err');}
}

// ── ПРОФИЛЬ ───────────────────────────────────────
function buildProfile(user, isSelf){
  const mf=me.friends||[];

  const incReq=allFriendships.find(f=>f.from===user.id&&f.to===me.id&&f.status==='pending');
  const userPosts=allPosts.filter(p=>p.authorId===user.id&&!p.communityId).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const online=onlineUsers.has(user.id);
  return `
    <div class="pban" style="${user.banner?`background-image:url('${user.banner}')`:''} background-size:cover;background-position:center"></div>
    <div class="paw">
      <div style="position:relative">
        <img class="pava" src="${user.avatar||ava(user.name)}" onerror="this.src='${ava(user.name)}'">
        ${odot(user.id,true)}
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;padding-bottom:.5rem">
        ${isSelf?`<button class="btn bs bsm" onclick="goPage('settings')"><i class="fas fa-pen"></i> Редактировать</button>`:''}
        ${!isSelf&&!isFriend&&!outReq&&!incReq?`<button class="btn bp bsm" onclick="addFriend('${user.id}')"><i class="fas fa-user-plus"></i> Добавить</button>`:''}
        ${!isSelf&&outReq?`<button class="btn bs bsm" disabled>Заявка отправлена</button>`:''}
        ${!isSelf&&incReq?`<button class="btn bg2c bsm" onclick="accFriendship('${incReq.id}')"><i class="fas fa-check"></i> Принять</button>`:''}
        ${!isSelf&&isFriend?`<button class="btn bs bsm" disabled><i class="fas fa-check"></i> В друзьях</button>`:''}
        ${!isSelf?`<button class="btn bs bsm" onclick="startChat('${user.id}')"><i class="fas fa-envelope"></i> Написать</button>`:''}
      </div>
    </div>
    <div class="pinfo">
      <div class="pname">${esc(user.name)}${user.verified?'<i class="fas fa-check-circle vc"></i>':''}</div>
      <div class="puname">${esc(user.username)} · <span style="color:${online?'var(--green)':'var(--txt2)'}">
        ${online?'● онлайн':'○ офлайн'}</span></div>
      ${user.bio?`<p class="pbio">${esc(user.bio)}</p>`:''}
      <div style="display:flex;gap:1.5rem;margin-top:.5rem">
        <div><b>${(user.friends||[]).length}</b> <span style="color:var(--txt2);font-size:.84rem">друзей</span></div>
        <div><b>${userPosts.length}</b> <span style="color:var(--txt2);font-size:.84rem">постов</span></div>
      </div>
    </div>
    <h3 style="font-family:'Unbounded',sans-serif;font-size:.88rem;margin:.5rem 0 1rem">Посты</h3>
    ${userPosts.map(p=>`<div class="pc">
      ${p.text?`<div class="ptxt">${esc(p.text)}</div>`:''}
      ${mediaHtml(p.media)}
      <div style="color:var(--txt2);font-size:.77rem;margin-top:.4rem">${ago(p.ts)} · ❤️ ${(p.likes||[]).length}</div>
    </div>`).join('')||`<p style="color:var(--txt2)">Нет постов</p>`}`;
}

function viewUser(uid2){

// ── ДРУЗЬЯ ────────────────────────────────────────

  let h=`<h2 style="font-family:'Unbounded',sans-serif;font-size:1rem;margin-bottom:1.5rem">Друзья</h2>`;

    h+=`<p style="font-weight:700;margin-bottom:.75rem;color:var(--txt2);font-size:.82rem">ЗАЯВКИ (${incoming.length})</p>`;

      <div class="ava-wrap"><img class="ava" src="${r.user.avatar||ava(r.user.name)}" onerror="this.src='${ava(r.user.name)}'">${odot(r.user.id)}</div>
      <div class="uri"><div class="un">${esc(r.user.name)}</div><div class="us">${esc(r.user.username)}</div></div>
      <div class="ura">
        <button class="btn bg2c bsm" onclick="accFriendship('${r.id}')"><i class="fas fa-check"></i></button>

      </div></div>`).join('');
    h+=`<div class="nsep"></div>`;
  }
  h+=`<p style="font-weight:700;margin-bottom:.75rem;color:var(--txt2);font-size:.82rem">МОИ ДРУЗЬЯ (${mf.length})</p>`;
  h+=mf.map(u=>`<div class="ur">
    <div class="ava-wrap"><img class="ava" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div>
    <div class="uri" style="cursor:pointer" onclick="viewUser('${u.id}')">
      <div class="un">${esc(u.name)}${u.verified?'<i class="fas fa-check-circle vc"></i>':''}</div>
      <div class="us">${esc(u.username)} · <span style="color:${onlineUsers.has(u.id)?'var(--green)':'var(--txt2)'}">
        ${onlineUsers.has(u.id)?'онлайн':'офлайн'}</span></div>
    </div>

      <button class="btn bs bsm" onclick="startChat('${u.id}')"><i class="fas fa-envelope"></i></button>

async function rejFriendship(fid){
  try{await DEL('/friendships/'+fid);allFriendships=allFriendships.filter(f=>f.id!==fid);renderPage();}
  catch(e){toast(e.message,'err');}
}
async function remFriend(uid2){
  const f=allFriendships.find(x=>(x.from===me.id&&x.to===uid2)||(x.from===uid2&&x.to===me.id));
  if(!f) return;
  try{await DEL('/friendships/'+f.id);await loadAll();me=allUsers.find(u=>u.id===me.id)||me;renderPage();renderHdr();toast('Удалён из друзей','ok');}
  catch(e){toast(e.message,'err');}
}

// ── СООБЩЕНИЯ ─────────────────────────────────────
function startChat(uid2){chatId=cid2(me.id,uid2);goPage('messages');}
function openChat(cid){chatId=cid;goPage('messages');}

function getChatInfo(cid){
  if(cid.startsWith('g_')){const g=allGroups.find(x=>x.id===cid);return{title:g?g.name:'Группа',isGroup:true};}
  if(cid.startsWith('cc_')){const commId=cid.replace('cc_','');const c=fc(commId);return{title:c?c.name:'Сообщество',isComm:true,commId};}
  const parts=cid.replace(/^chat_/,'').split('_');
  const otherId=parts.find(p=>p!==me.id);
  const other=fu(otherId);
  return{title:other?other.name:'Чат',other,otherId};
}

function renderMessages(){
  const c=document.getElementById('cnt');
  if(chatId){c.innerHTML=buildChatUI(chatId);loadChatMsgs(chatId);}
  else{
    c.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h2 style="font-family:'Unbounded',sans-serif;font-size:1rem">Сообщения</h2>
      <button class="btn bs bsm" onclick="askCreateGroup()"><i class="fas fa-users"></i> Группа</button>
    </div><div id="chat-list"></div>`;
    renderChatList();
  }
}

function renderChatList(){
  const el=document.getElementById('chat-list'); if(!el) return;
  const items=[];
  (me.friends||[]).forEach(uid2=>{const u=fu(uid2);if(u) items.push({id:cid2(me.id,uid2),title:u.name,user:u,type:'dm'});});
  allGroups.forEach(g=>items.push({id:g.id,title:g.name,type:'group'}));
  allComms.forEach(comm=>{const r=getMemberRank(comm.id,me.id);if(r)items.push({id:'cc_'+comm.id,title:comm.name,avatar:comm.avatar,type:'comm',rank:r});});
  if(!items.length){el.innerHTML=`<p style="color:var(--txt2)">Нет диалогов. Добавь друзей!</p>`;return;}
  el.innerHTML=items.map(it=>{
    const avatarEl=it.user?`<div class="ava-wrap"><img class="ava" src="${it.user.avatar||ava(it.user.name)}" onerror="this.src='${ava(it.user.name)}'">${odot(it.user.id)}</div>`
      :`<div class="ava" style="background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;border-radius:50%;flex-shrink:0;width:44px;height:44px"><i class="fas fa-${it.type==='comm'?'users':'users'}"></i></div>`;
    const badge=it.type==='group'?`<span class="tag tb">группа</span>`:it.type==='comm'?`<span class="tag tb">чат</span>`:'';
    const sub=it.type==='dm'&&it.user?`<div style="color:${onlineUsers.has(it.user.id)?'var(--green)':'var(--txt2)'};font-size:.72rem">${onlineUsers.has(it.user.id)?'● онлайн':'○ офлайн'}</div>`
      :it.rank?`<div style="font-size:.72rem">${rankBadge(it.rank)}</div>`:'';
    return `<div class="ur" style="cursor:pointer" onclick="openChat('${it.id}')">
      ${avatarEl}
      <div class="uri"><div class="un">${esc(it.title)} ${badge}</div>${sub}</div>
    </div>`;
  }).join('');
}

function buildChatUI(cid){
  const info=getChatInfo(cid);
  const isCommChat=cid.startsWith('cc_');
  const commId=isCommChat?cid.replace('cc_',''):null;
  const canWrite=!isCommChat||canPostInComm(commId);
  const myRank=isCommChat?getMemberRank(commId,me.id):null;
  const online=info.other&&onlineUsers.has(info.other.id);
  const avatarEl=info.other?`<div class="ava-wrap"><img class="avsm" src="${info.other.avatar||ava(info.other.name)}" onerror="this.src='${ava(info.other.name)}'">${odot(info.other.id)}</div>`
    :`<div class="avsm" style="background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;border-radius:50%"><i class="fas fa-users"></i></div>`;
  const inputArea=canWrite?`<div class="ciw">
    <div class="cim">
      <input id="ci" placeholder="Написать..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${cid}');}" oninput="sendTypingEvent('${cid}')">
      <label class="cib"><i class="fas fa-image"></i><input type="file" accept="image/*" style="display:none" onchange="sendImg(this,'${cid}')"></label>
      <button class="cib" id="vbtn" onmousedown="startVoice('${cid}')" onmouseup="stopVoice()" ontouchstart="startVoice('${cid}')" ontouchend="stopVoice()"><i class="fas fa-microphone"></i></button>
    </div>
    <button class="sbtn" onclick="sendMsg('${cid}')"><i class="fas fa-paper-plane"></i></button>
  </div>`:`<div style="padding:.7rem 1.25rem;background:var(--bg2);border-top:1px solid var(--border);text-align:center;color:var(--txt2);font-size:.84rem">
    🔒 Только Admin / Moderator / Owner могут писать${myRank?' · Ваш ранг: '+rankBadge(myRank):''}
  </div>`;
  return `<button class="btn bs bsm" style="margin-bottom:.75rem" onclick="chatId=null;goPage('messages')"><i class="fas fa-arrow-left"></i> Назад</button>
  <div class="cw">
    <div class="chdr">
      ${avatarEl}
      <div style="flex:1;min-width:0">
        <div style="font-weight:700">${esc(info.title)}${online?`<span style="color:var(--green);font-size:.72rem;margin-left:.4rem">● онлайн</span>`:''}</div>
        ${isCommChat?`<div style="font-size:.74rem;color:var(--txt2)">Только Admin+ могут писать</div>`:''}
      </div>
      ${!isCommChat&&info.other?`<button class="btn bs bsm" onclick="startCall('${cid}','audio')"><i class="fas fa-phone"></i></button>
        <button class="btn bs bsm" onclick="startCall('${cid}','video')"><i class="fas fa-video"></i></button>`:''}
      ${info.isGroup?`<button class="btn bs bsm" onclick="askAddToGroup('${cid}')"><i class="fas fa-user-plus"></i></button>`:''}
    </div>
    <div class="cmsg" id="cmsg"></div>
    <div class="typing-bar" id="typing-bar"></div>
    ${inputArea}
  </div>`;
}

async function loadChatMsgs(cid){
  const el=document.getElementById('cmsg'); if(!el) return;
  el.innerHTML=`<div style="text-align:center;padding:2rem"><span class="spin"></span></div>`;
  try{
    const msgs=await GET('/messages?chatId='+encodeURIComponent(cid));
    const info=getChatInfo(cid);
    if(!msgs.length){el.innerHTML=`<p style="text-align:center;color:var(--txt2);padding:2rem 0">Напишите первым!</p>`;return;}
    el.innerHTML=msgs.map(m=>buildMsgHtml(m,info,cid)).join('');
    el.scrollTop=el.scrollHeight;
  }catch(e){el.innerHTML=`<p style="color:var(--red);padding:1rem">Ошибка: ${esc(e.message)}</p>`;}
}

function buildMsgHtml(m,info,cid){
  const isMe=m.senderId===me.id;
  const sender=fu(m.senderId);
  const rank=info.commId?getMemberRank(info.commId,m.senderId):null;

function startVoice(cid){
  if(!navigator.mediaDevices){toast('Микрофон недоступен','err');return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    voiceCid=cid;mrChunks=[];
    const btn=document.getElementById('vbtn');if(btn)btn.classList.add('rec');
    mrec=new MediaRecorder(stream);
    mrec.ondataavailable=e=>{if(e.data.size>0)mrChunks.push(e.data);};
    mrec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(btn)btn.classList.remove('rec');
      if(!mrChunks.length) return;
      const blob=new Blob(mrChunks,{type:'audio/webm'});
      let voice; try{voice=await rf(blob);}catch{return;}
      try{const m=await POST('/messages',{chatId:voiceCid,voice});appendMsg(m);}catch(e){toast(e.message,'err');}
    };
    mrec.start();
  }).catch(()=>toast('Нет доступа к микрофону','err'));
}
function stopVoice(){if(mrec&&mrec.state!=='inactive')mrec.stop();}

function getPeerId(cid){return cid.replace(/^chat_/,'').split('_').find(p=>p!==me.id);}

async function startCall(cid,type){
  callType=type;
  const peerId=getChatInfo(cid).otherId||getPeerId(cid);
  if(!peerId){toast('Нельзя определить собеседника','err');return;}
  try{localStream=await navigator.mediaDevices.getUserMedia({video:type==='video',audio:true});}
  catch{toast('Разрешите доступ к камере/микрофону','err');return;}
  document.getElementById('vloc').srcObject=localStream;
  document.getElementById('cs-nm').textContent=getChatInfo(cid).title;
  document.getElementById('cs-st').textContent='Вызов...';
  document.getElementById('b-cam').style.display=type==='video'?'flex':'none';
  document.getElementById('callscr').classList.add('active');
  muted=false;camOff=false;callFrom=peerId;
  pc=new RTCPeerConnection(STUN);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{document.getElementById('vrem').srcObject=e.streams[0];document.getElementById('cs-st').textContent='Соединено ✓';};
  pc.onicecandidate=e=>{if(e.candidate)wsSend({type:'call_ice',to:peerId,candidate:e.candidate});};
  pc.onconnectionstatechange=()=>{if(['disconnected','failed','closed'].includes(pc.connectionState))endCall();};
  const offer=await pc.createOffer();await pc.setLocalDescription(offer);
  wsSend({type:'call_offer',to:peerId,offer,callType:type});
}

function showIncoming(m){
  document.getElementById('ic-av').src=m.callerAva||ava(m.callerName||'?');
  document.getElementById('ic-nm').textContent=m.callerName||'?';
  document.getElementById('ic-tp').textContent=m.callType==='video'?'📹 Видеозвонок':'📞 Аудиозвонок';
  document.getElementById('inc').classList.add('show');
}
async function acceptCall(){
  document.getElementById('inc').classList.remove('show');if(!pendingCall)return;
  const{from,offer,callType:ct,callerName}=pendingCall;callFrom=from;callType=ct;pendingCall=null;
  try{localStream=await navigator.mediaDevices.getUserMedia({video:ct==='video',audio:true});}
  catch{toast('Нет доступа к камере/микрофону','err');return;}
  document.getElementById('vloc').srcObject=localStream;
  document.getElementById('cs-nm').textContent=callerName||'?';
  document.getElementById('cs-st').textContent='Соединение...';
  document.getElementById('b-cam').style.display=ct==='video'?'flex':'none';
  document.getElementById('callscr').classList.add('active');
  muted=false;camOff=false;
  pc=new RTCPeerConnection(STUN);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{document.getElementById('vrem').srcObject=e.streams[0];document.getElementById('cs-st').textContent='Соединено ✓';};
  pc.onicecandidate=e=>{if(e.candidate)wsSend({type:'call_ice',to:from,candidate:e.candidate});};
  await pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer=await pc.createAnswer();await pc.setLocalDescription(answer);
  wsSend({type:'call_answer',to:from,answer});
}
function rejectCall(){document.getElementById('inc').classList.remove('show');if(pendingCall){wsSend({type:'call_reject',to:pendingCall.from});pendingCall=null;}}
function endCall(){
  if(pc){try{pc.close();}catch{}pc=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(callFrom){wsSend({type:'call_end',to:callFrom});callFrom=null;}
  document.getElementById('callscr').classList.remove('active');
  document.getElementById('vrem').srcObject=null;document.getElementById('vloc').srcObject=null;
}
function toggleMute(){if(!localStream)return;muted=!muted;localStream.getAudioTracks().forEach(t=>t.enabled=!muted);const b=document.getElementById('b-mu');b.innerHTML=`<i class="fas fa-microphone${muted?'-slash':''}"></i>`;b.classList.toggle('muted',muted);}
function toggleCam(){if(!localStream)return;camOff=!camOff;localStream.getVideoTracks().forEach(t=>t.enabled=!camOff);const b=document.getElementById('b-cam');b.innerHTML=`<i class="fas fa-video${camOff?'-slash':''}"></i>`;b.classList.toggle('muted',camOff);}

function showLi(){document.getElementById('a-li').style.display='';document.getElementById('a-rg').style.display='none';}
function showReg(){document.getElementById('a-li').style.display='none';document.getElementById('a-rg').style.display='';}

async function doLogin(){
  const id=(document.getElementById('li-id').value||'').trim();
  const pw=document.getElementById('li-pw').value;
  const err=document.getElementById('li-e');err.style.display='none';
  if(!id||!pw){err.textContent='Заполните все поля';err.style.display='';return;}
  const btn=document.getElementById('li-b');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    const data=await POST('/auth/login',{id,password:pw});
    token=data.token;me=data.user;
    localStorage.setItem('knb_token',token);localStorage.setItem('knb_me',JSON.stringify(me));
    await loadAll();CM('m-auth');render();connectWS();
  }catch(e){err.textContent=e.message;err.style.display='';}
  btn.disabled=false;btn.innerHTML='Войти';
}
async function doReg(){
  const email=(document.getElementById('rg-em').value||'').trim();
  const name=(document.getElementById('rg-nm').value||'').trim();
  const username=(document.getElementById('rg-un').value||'').trim();
  const password=document.getElementById('rg-pw').value;
  const bio=(document.getElementById('rg-bi').value||'').trim();
  const err=document.getElementById('rg-e');err.style.display='none';
  if(!email||!name||!username||!password){err.textContent='Заполните все поля';err.style.display='';return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Неверный email';err.style.display='';return;}
  if(password.length<6){err.textContent='Пароль минимум 6 символов';err.style.display='';return;}
  const btn=document.getElementById('rg-b');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  let avatar='';try{const f=document.getElementById('rg-av').files[0];if(f)avatar=await rf(f);}catch{}
  try{
    const data=await POST('/auth/register',{email,password,name,username,bio,avatar});
    token=data.token;me=data.user;
    localStorage.setItem('knb_token',token);localStorage.setItem('knb_me',JSON.stringify(me));
    await loadAll();CM('m-auth');render();connectWS();
  }catch(e){err.textContent=e.message;err.style.display='';}
  btn.disabled=false;btn.innerHTML='Зарегистрироваться';
}
async function doLogout(){
  token=null;me=null;
  localStorage.removeItem('knb_token');localStorage.removeItem('knb_me');
  allUsers=[];allPosts=[];allComms=[];allFriendships=[];allNotifs=[];allGroups=[];commMembers={};onlineUsers=new Set();
  if(ws){try{ws.close();}catch{}ws=null;}
  PAGE='feed';chatId=null;render();
}

  helper:    {label:'Помощник',    color:'#22c55e', icon:'🤝', badge:'bg:#22c55e'},
  user:      {label:'Пользователь',color:'#6b7280', icon:'',   badge:''},
};
function getSiteRole(user){
  if(!user) return 'user';
  if(user.email===OWNER_EMAIL) return 'owner';
  return user.siteRole||'user';
}
function isStaff(user){ return ['owner','admin','moderator','helper'].includes(getSiteRole(user)); }
function siteRoleBadge(user){
  const r=getSiteRole(user); const info=SITE_ROLES[r];
  if(!info||r==='user') return '';
  return `<span style="font-size:.68rem;font-weight:700;color:${info.color};background:${info.color}18;padding:.1rem .45rem;border-radius:8px">${info.icon} ${info.label}</span>`;
}

const FORUM_CATS = {

  suggestion: {label:'Предложение',  icon:'💡', color:'var(--yellow)'},
  bug:        {label:'Баг/Ошибка',   icon:'🐛', color:'var(--red)'},
  appeal:     {label:'Жалоба на администратора', icon:'⚖️', color:'var(--purple)'},
  other:      {label:'Другое',       icon:'📌', color:'var(--txt2)'},
};
const COMPLAINT_STATUS = {
  pending:    {label:'Ожидает',       color:'var(--yellow)'},
  reviewing:  {label:'Рассматривается',color:'var(--blue)'},
  resolved:   {label:'Решена',        color:'var(--green)'},
  rejected:   {label:'Отклонена',     color:'var(--red)'},
};

let forumPosts=[], currentForumPost=null;
let complaints=[], currentComplaint=null;

async function goForum(){
  PAGE='forum'; renderNav();
  const c=document.getElementById('cnt');
  c.innerHTML=`<div style="text-align:center;padding:3rem"><span class="spin"></span></div>`;
  try{
    forumPosts=await GET('/forum');
    renderForumList();
  }catch(e){c.innerHTML=`<p style="color:var(--red)">${esc(e.message)}</p>`;}
}

function renderForumList(){
  const c=document.getElementById('cnt');
  const pinned=forumPosts.filter(p=>p.pinned);
  const normal=forumPosts.filter(p=>!p.pinned);
  const myRole=getSiteRole(me);
  c.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem">
      <h2 style="font-family:'Unbounded',sans-serif;font-size:1rem">💬 Форум</h2>
      <button class="btn bp bsm" onclick="showCreateForumPost()"><i class="fas fa-plus"></i> Новая тема</button>
    </div>
    <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem">
      ${Object.entries(FORUM_CATS).map(([k,v])=>`<button class="btn bs bsm" onclick="filterForum('${k}')" id="fcat-${k}" style="font-size:.78rem">${v.icon} ${v.label}</button>`).join('')}

    </div>
    <div id="forum-list">${buildForumItems([...pinned,...normal])}</div>`;
}

function buildForumItems(posts){
  if(!posts.length) return `<p style="color:var(--txt2);text-align:center;padding:2rem">Нет тем</p>`;
  return posts.map(p=>{
    const cat=FORUM_CATS[p.category]||FORUM_CATS.other;
    const statusColor=p.status==='closed'?'var(--txt2)':'var(--green)';
    return `<div class="pc" style="cursor:pointer" onclick="openForumPost('${p.id}')">
      <div style="display:flex;align-items:flex-start;gap:.75rem">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem">
            ${p.pinned?'<span style="font-size:.72rem;color:var(--yellow)">📌 Закреплено</span>':''}
            <span style="font-size:.72rem;font-weight:700;color:${cat.color}">${cat.icon} ${cat.label}</span>
            <span style="font-size:.72rem;color:${statusColor}">${p.status==='closed'?'🔒 Закрыто':'🟢 Открыто'}</span>
          </div>
          <div style="font-weight:700;font-size:.95rem;margin-bottom:.25rem">${esc(p.title)}</div>
          <div style="color:var(--txt2);font-size:.83rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px">${esc(p.text)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:.72rem;color:var(--txt2)">${ago(p.ts)}</div>
          <div style="font-size:.78rem;color:var(--txt2);margin-top:.2rem">💬 ${p.replyCount||0}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.4rem;margin-top:.5rem">
        <img src="${p.author?.avatar||ava(p.author?.name||'?')}" style="width:18px;height:18px;border-radius:50%;object-fit:cover">
        <span style="font-size:.75rem;color:var(--txt2)">${esc(p.author?.name||'?')}</span>
        ${siteRoleBadge(p.author)}
        ${p.author?.verified?'<i class="fas fa-check-circle" style="color:var(--blue);font-size:.7rem"></i>':''}
      </div>
    </div>`;
  }).join('');
}

function filterForum(cat){
  const items=cat?forumPosts.filter(p=>p.category===cat):forumPosts;
  document.getElementById('forum-list').innerHTML=buildForumItems(items);
}

function showCreateForumPost(){
  const old=document.getElementById('forum-create-modal');if(old)old.remove();

  div.addEventListener('click',e=>{if(e.target===div)div.remove();});

    <h2>💬 Новая тема</h2>
    <div class="fg"><label>Заголовок</label><input id="fc-title" placeholder="Кратко опишите тему..." maxlength="100"></div>

}

async function submitForumPost(){
  const title=(document.getElementById('fc-title').value||'').trim();
  const text=(document.getElementById('fc-text').value||'').trim();
  const cat=document.getElementById('fc-cat').value;
  if(!title){toast('Укажите заголовок','err');return;}
  if(!text){toast('Укажите текст','err');return;}
  const btn=document.getElementById('fc-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  let img=null;
  const f=document.getElementById('fc-img').files[0];
  if(f){try{img=await rf(f);}catch{}}
  try{
    const post=await POST('/forum',{title,text,category:cat,img});
    forumPosts.unshift({...post,replyCount:0,author:{name:me.name,avatar:me.avatar,verified:me.verified,siteRole:me.siteRole||'user'}});
    document.getElementById('forum-create-modal').remove();
    renderForumList();
    toast('Тема создана!','ok');
  }catch(e){toast(e.message,'err');}
  btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Отправить';
}

async function openForumPost(id){
  const c=document.getElementById('cnt');
  c.innerHTML=`<div style="text-align:center;padding:3rem"><span class="spin"></span></div>`;
  try{
    const post=await GET('/forum/'+id);
    currentForumPost=post;
    renderForumPost(post);
  }catch(e){c.innerHTML=`<p style="color:var(--red)">${esc(e.message)}</p>`;}
}

function renderForumPost(post){
  const c=document.getElementById('cnt');
  const cat=FORUM_CATS[post.category]||FORUM_CATS.other;
  const canReply=isStaff(me)||(post.authorId===me.id);
  const canManage=isStaff(me);
  c.innerHTML=`
    <button class="btn bs bsm" style="margin-bottom:.75rem" onclick="goForum()"><i class="fas fa-arrow-left"></i> Форум</button>
    <div class="pc">
      <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem">
        <span style="font-size:.78rem;font-weight:700;color:${cat.color}">${cat.icon} ${cat.label}</span>
        <span style="font-size:.75rem;color:${post.status==='closed'?'var(--txt2)':'var(--green)'}">${post.status==='closed'?'🔒 Закрыто':'🟢 Открыто'}</span>
        ${post.pinned?'<span style="font-size:.72rem;color:var(--yellow)">📌 Закреплено</span>':''}
      </div>
      <h2 style="font-family:'Unbounded',sans-serif;font-size:1rem;margin-bottom:.75rem">${esc(post.title)}</h2>

        <div style="position:relative"><img src="${post.author?.avatar||ava(post.author?.name||'?')}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">${odot(post.authorId)}</div>
        <div>
          <div style="font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:.3rem">
            ${esc(post.author?.name||'?')}${post.author?.verified?'<i class="fas fa-check-circle" style="color:var(--blue);font-size:.75rem"></i>':''}
            ${siteRoleBadge(post.author)}
          </div>
          <div style="color:var(--txt2);font-size:.75rem">${ago(post.ts)}</div>
        </div>
      </div>
      <div class="ptxt">${esc(post.text)}</div>
      ${post.img?`<img src="${post.img}" class="pimg" onclick="openLB(this.src)">`:''}

        <button class="btn bs bsm" onclick="toggleForumPin('${post.id}')">${post.pinned?'📌 Открепить':'📌 Закрепить'}</button>
        <button class="btn bd bsm" onclick="showConfirm('Удалить тему?','',()=>deleteForumPost('${post.id}'))">🗑 Удалить</button>
      </div>`:''}

    <h3 style="font-family:'Unbounded',sans-serif;font-size:.82rem;color:var(--txt2);letter-spacing:.5px;margin:.75rem 0">ОТВЕТЫ (${(post.replies||[]).length})</h3>
    <div id="forum-replies">
      ${(post.replies||[]).map(r=>buildReplyHtml(r)).join('')||`<p style="color:var(--txt2);font-size:.85rem;text-align:center;padding:1rem 0">Ответов пока нет</p>`}
    </div>
    ${canReply&&post.status==='open'?`
    <div class="pc" style="margin-top:.75rem">
      <div style="font-weight:700;font-size:.85rem;margin-bottom:.75rem">${isStaff(me)?'✍️ Ответ персонала':'✍️ Ответить'}</div>

    </div>`:`${post.status==='closed'?`<div style="text-align:center;padding:1rem;color:var(--txt2);background:var(--bg3);border-radius:12px;margin-top:.75rem">🔒 Тема закрыта</div>`:`<div style="text-align:center;padding:1rem;color:var(--txt2);background:var(--bg3);border-radius:12px;margin-top:.75rem">Только персонал может отвечать</div>`}`}`;
}

function buildReplyHtml(r){
  const isStaffReply=isStaff(r.author);
  return `<div class="pc" style="${isStaffReply?'border-color:var(--blue);background:rgba(79,142,247,.04)':''}">
    ${isStaffReply?`<div style="font-size:.72rem;font-weight:700;color:var(--blue);margin-bottom:.4rem">👮 Ответ персонала</div>`:''}
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem">
      <div style="position:relative"><img src="${r.author?.avatar||ava(r.author?.name||'?')}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">${odot(r.authorId)}</div>

        <div style="font-weight:700;font-size:.85rem;display:flex;align-items:center;gap:.3rem">
          ${esc(r.author?.name||'?')}${r.author?.verified?'<i class="fas fa-check-circle" style="color:var(--blue);font-size:.72rem"></i>':''}
          ${siteRoleBadge(r.author)}
        </div>

      </div>
    </div>
    <div class="ptxt">${esc(r.text)}</div>
    ${r.img?`<img src="${r.img}" class="pimg" onclick="openLB(this.src)">`:''}
  </div>`;
}

async function submitForumReply(postId){
  const text=(document.getElementById('fp-reply').value||'').trim();
  if(!text){toast('Введите ответ','err');return;}
  const btn=document.getElementById('fp-reply-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  let img=null;
  const f=document.getElementById('fp-reply-img').files[0];
  if(f){try{img=await rf(f);}catch{}}
  try{
    const updated=await POST('/forum/'+postId+'/reply',{text,img});
    currentForumPost=updated;
    renderForumPost(updated);
    toast('Ответ отправлен','ok');
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Отправить';}
}

async function toggleForumStatus(id){
  try{const p=await POST('/forum/'+id+'/status');currentForumPost=p;openForumPost(id);toast('Статус изменён','ok');}
  catch(e){toast(e.message,'err');}
}
async function toggleForumPin(id){
  try{await POST('/forum/'+id+'/pin');openForumPost(id);toast('Готово','ok');}
  catch(e){toast(e.message,'err');}
}
async function deleteForumPost(id){
  try{await DEL('/forum/'+id);toast('Тема удалена','ok');goForum();}
  catch(e){toast(e.message,'err');}
}

        ${isStaff(r.author)?`<div style="font-size:.7rem;color:var(--blue);font-weight:700;margin-bottom:.2rem">👮 ${esc(r.author?.name||'Персонал')} ${siteRoleBadge(r.author)}</div>`:''}
        <div style="font-size:.86rem">${esc(r.text)}</div>
        <div style="font-size:.7rem;color:var(--txt2);margin-top:.2rem">${ago(r.ts)}</div>
      </div>`).join('')||`<p style="color:var(--txt2);text-align:center;font-size:.83rem;padding:.5rem 0">Нет ответов</p>`}
    </div>
    ${canReply?`<div style="display:flex;gap:.5rem">
      <input id="comp-reply-inp" type="text" placeholder="Ответ..." style="flex:1;padding:.65rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none">
      <button class="sbtn" onclick="sendComplaintReply('${id}')"><i class="fas fa-paper-plane"></i></button>
    </div>`:''}
  </div>`;
  document.body.appendChild(div);
}

async function sendComplaintReply(id){
  const inp=document.getElementById('comp-reply-inp');
  const text=(inp.value||'').trim(); if(!text) return;
  inp.value='';
  try{
    const updated=await POST('/complaints/'+id+'/reply',{text});
    // обновить список
    const idx=complaints.findIndex(c=>c.id===id);if(idx>=0)complaints[idx]=updated;
    // обновить modal
    document.getElementById('comp-modal').remove();
    openComplaint(id);
    toast('Ответ отправлен','ok');
  }catch(e){toast(e.message,'err');}
}

async function setComplaintStatus(id, status, btn){
  try{
    await POST('/complaints/'+id+'/status',{status});
    const idx=complaints.findIndex(c=>c.id===id);if(idx>=0)complaints[idx].status=status;
    document.getElementById('comp-modal').remove();
    openComplaint(id);
    toast('Статус изменён','ok');
  }catch(e){toast(e.message,'err');}
}

//  РОЛИ САЙТА в админ-панели

async function adm_setSiteRole(uid, role){
  try{
    await POST('/admin/users/'+uid+'/siteRole',{role});
    await loadAll(); me=allUsers.find(u=>u.id===me.id)||me;
    renderAdmin();toast('Роль обновлена','ok');
  }catch(e){toast(e.message,'err');}
}

async function init(){
  initSearch();
  if(!token){render();return;}
  try{const s=localStorage.getItem('knb_me');if(s)me=JSON.parse(s);}catch{}
  render(); // быстро покажем из кеша
  try{
    await loadAll();
    me=allUsers.find(u=>u.id===me?.id)||me;
    if(me){localStorage.setItem('knb_me',JSON.stringify(me));connectWS();}
    render();
  }catch{
    token=null;localStorage.removeItem('knb_token');localStorage.removeItem('knb_me');me=null;render();
  }
}
init();

</script>

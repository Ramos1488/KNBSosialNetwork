<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KNB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--card:#161923;--border:#252a38;--txt:#e8eaf0;--txt2:#6b7280;--blue:#4f8ef7;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7}
.light{--bg:#f0f2f7;--bg2:#fff;--bg3:#e8ecf4;--card:#fff;--border:#d1d9e8;--txt:#0d1117;--txt2:#6b7280}
body{background:var(--bg);color:var(--txt);font-family:'Manrope',sans-serif;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.25rem;height:60px;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:100}
.logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:1.25rem;color:var(--blue);cursor:pointer}
.logo span{color:var(--txt)}
.sw{flex:1;max-width:380px;position:relative}
.sw i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt2);font-size:.85rem;pointer-events:none}
#si{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:.5rem 1rem .5rem 2.2rem;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.9rem;outline:none}
#si:focus{border-color:var(--blue)}
#srp{position:absolute;top:calc(100%+6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;z-index:300;display:none;box-shadow:0 12px 40px rgba(0,0,0,.5)}
#srp.open{display:block}
.srp-item{display:flex;align-items:center;gap:.65rem;padding:.7rem 1rem;cursor:pointer;transition:.15s}
.srp-item:hover{background:var(--bg3)}
.srp-item img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.srp-sep{padding:.4rem 1rem;font-size:.72rem;font-weight:700;color:var(--txt2);background:var(--bg3)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.hbtn{background:none;border:none;color:var(--txt2);width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;position:relative;transition:.2s}
.hbtn:hover{background:var(--bg3);color:var(--txt)}
.hava{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--blue)}
.bdg{position:absolute;top:3px;right:3px;background:var(--red);color:#fff;font-size:.58rem;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}
.mtog{display:none;background:none;border:none;color:var(--txt);font-size:1.2rem;cursor:pointer;padding:.4rem;flex-shrink:0}
.layout{display:flex;min-height:calc(100vh - 60px)}
.lnav{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:.75rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:.2rem}
.ni{display:flex;align-items:center;gap:.85rem;padding:.7rem 1rem;border-radius:12px;cursor:pointer;color:var(--txt2);font-weight:600;font-size:.88rem;transition:.15s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bg3);color:var(--txt)}.ni.active{background:var(--blue);color:#fff}
.ni i{width:18px;font-size:.95rem;flex-shrink:0}
.nsep{height:1px;background:var(--border);margin:.4rem 0}
.center{flex:1;max-width:700px;padding:1.25rem 1rem;min-width:0}
.rp{width:280px;flex-shrink:0;padding:1.25rem .75rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
.rpb{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem}
.rpt{font-family:'Unbounded',sans-serif;font-size:.72rem;font-weight:700;color:var(--txt2);letter-spacing:1px;margin-bottom:.85rem}
#tw{position:fixed;top:70px;right:1.25rem;z-index:9999;display:flex;flex-direction:column;gap:.45rem;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:.7rem 1.1rem;font-size:.85rem;font-weight:600;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:tin .25s ease;pointer-events:all;transition:opacity .3s,transform .3s}
.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}.toast.info{border-color:var(--blue);color:var(--blue)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
#cv{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:800;display:none;align-items:center;justify-content:center}
#cv.open{display:flex}
#cb{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.75rem;max-width:340px;width:92%;text-align:center}
#cb h3{font-family:'Unbounded',sans-serif;font-size:.95rem;margin-bottom:.6rem}
#cb p{color:var(--txt2);font-size:.88rem;margin-bottom:1.4rem;line-height:1.5}
.row{display:flex;gap:.6rem;justify-content:center}
#iv{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:800;display:none;align-items:center;justify-content:center}
#iv.open{display:flex}
#ib{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.75rem;max-width:380px;width:92%}
#ib h3{font-family:'Unbounded',sans-serif;font-size:.95rem;margin-bottom:1rem}
#iv-inp{width:100%;padding:.7rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.9rem;outline:none;margin-bottom:1rem}
#iv-inp:focus{border-color:var(--blue)}
.pc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.1rem;margin-bottom:.85rem;transition:.2s}
.pc:hover{border-color:rgba(79,142,247,.3)}
.ph{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem;cursor:pointer}
.ava{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--bg3);flex-shrink:0;position:relative}
.avsm{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--bg3);flex-shrink:0}
.pan{font-weight:700;font-size:.92rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.pm{color:var(--txt2);font-size:.78rem;margin-top:.1rem}
.vc{color:var(--blue);font-size:.82rem}
.ptxt{line-height:1.6;word-break:break-word;margin-bottom:.65rem;font-size:.92rem}
.pimg{width:100%;border-radius:12px;max-height:400px;object-fit:cover;margin-bottom:.65rem;cursor:pointer;display:block}
.pact{display:flex;gap:.4rem;border-top:1px solid var(--border);padding-top:.65rem;flex-wrap:wrap}
.ab{background:none;border:none;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:.35rem;font-size:.83rem;font-family:'Manrope',sans-serif;padding:.35rem .65rem;border-radius:20px;transition:.15s;font-weight:600}
.ab:hover{background:var(--bg3)}.ab.liked{color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:.45rem;padding:.55rem 1.1rem;border-radius:24px;border:none;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:700;font-size:.88rem;transition:.15s;white-space:nowrap}
.bp{background:var(--blue);color:#fff}.bp:hover{opacity:.85}
.bs{background:var(--bg3);color:var(--txt);border:1px solid var(--border)}.bs:hover{border-color:var(--blue)}
.bd{background:var(--red);color:#fff}.bd:hover{opacity:.85}
.bg2c{background:var(--green);color:#fff}.bg2c:hover{opacity:.85}
.bsm{padding:.3rem .75rem;font-size:.8rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.fg{margin-bottom:.9rem}
.fg label{display:block;font-size:.83rem;font-weight:600;color:var(--txt2);margin-bottom:.35rem}
.fg input,.fg textarea,.fg select{width:100%;padding:.65rem .9rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none;transition:.2s;resize:vertical}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--blue)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center}
.mo.open{display:flex}
.mb{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:1.75rem;width:92%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative}
.mb h2{font-family:'Unbounded',sans-serif;font-size:1rem;margin-bottom:1.25rem}
.mc{position:absolute;top:.9rem;right:.9rem;background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:.8rem}
.mc:hover{background:var(--red);color:#fff}
.pban{height:160px;border-radius:16px 16px 0 0;background-size:cover;background-position:center;margin:-1px -1px 0}
.paw{padding:0 1.25rem;margin-top:-42px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:.85rem}
.pava{width:84px;height:84px;border-radius:50%;border:4px solid var(--bg2);object-fit:cover;background:var(--bg3)}
.pinfo{padding:0 1.25rem 1.25rem}
.pname{font-family:'Unbounded',sans-serif;font-size:1.05rem;font-weight:900;display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.puname{color:var(--txt2);font-size:.82rem;margin-top:.2rem}
.pbio{margin:.65rem 0;line-height:1.6;font-size:.9rem}
.online-dot{width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg2);position:absolute;bottom:0;right:0}
.online-dot.off{background:var(--txt2)}
.cw{display:flex;flex-direction:column;height:calc(100vh - 145px);max-height:700px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--card)}
.chdr{padding:.75rem 1.1rem;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.typing-bar{padding:.3rem 1.1rem;font-size:.78rem;color:var(--txt2);background:var(--bg2);min-height:22px;font-style:italic;border-bottom:1px solid var(--border)}
.cmsg{flex:1;overflow-y:auto;padding:.85rem;display:flex;flex-direction:column;gap:.55rem}
.mw{display:flex;flex-direction:column}.mw.me{align-items:flex-end}.mw.them{align-items:flex-start}
.msg{max-width:74%;padding:.6rem .95rem;border-radius:18px;font-size:.88rem;line-height:1.5;position:relative;word-break:break-word}
.msg.them{background:var(--bg3);border-radius:18px 18px 18px 4px}
.msg.me{background:var(--blue);color:#fff;border-radius:18px 18px 4px 18px}
.mauth{font-size:.7rem;font-weight:700;margin-bottom:.2rem;color:var(--txt2)}
.mtime{font-size:.66rem;opacity:.55;margin-top:.2rem}
.mdel{position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.mw:hover .mdel{display:flex}
.mimg{max-width:200px;border-radius:10px;cursor:pointer;display:block;margin-top:.3rem}
.ciw{padding:.65rem .85rem;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:.45rem;align-items:center}
.cim{flex:1;display:flex;align-items:center;gap:.35rem;background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:.35rem .65rem .35rem .9rem}
.cim:focus-within{border-color:var(--blue)}
.cim input{flex:1;background:none;border:none;color:var(--txt);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none}
.cib{background:none;border:none;color:var(--txt2);cursor:pointer;padding:.2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;width:28px;height:28px;transition:.15s}
.cib:hover{color:var(--blue)}.cib.rec{color:var(--red)!important;animation:pulse 1s infinite}
.sbtn{background:var(--blue);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.sbtn:hover{opacity:.85}
.stories-row{display:flex;gap:.75rem;overflow-x:auto;padding:.25rem 0 .85rem;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-item{flex-shrink:0;width:72px;display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer}
.story-ring{width:64px;height:64px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--blue),var(--purple));position:relative}
.story-ring.seen{background:var(--bg3)}
.story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid var(--bg2)}
.story-add{width:64px;height:64px;border-radius:50%;background:var(--bg3);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4rem;color:var(--blue)}
.story-label{font-size:.67rem;font-weight:700;color:var(--txt2);max-width:64px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#story-viewer{position:fixed;inset:0;background:#000;z-index:1100;display:none;flex-direction:column;align-items:center;justify-content:center}
#story-viewer.open{display:flex}
#sv-media{max-width:420px;max-height:75vh;border-radius:16px;object-fit:contain}
#sv-bar{position:absolute;top:0;left:0;right:0;display:flex;gap:3px;padding:.6rem .85rem .3rem}
.sv-seg{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.sv-seg-fill{height:100%;background:#fff;transition:width linear}
#sv-close{position:absolute;top:.85rem;right:1rem;background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;z-index:5}
#sv-user{position:absolute;top:1.5rem;left:1rem;display:flex;align-items:center;gap:.5rem;z-index:5}
#sv-like{position:absolute;bottom:1.5rem;right:1rem;background:rgba(255,255,255,.15);border:none;color:#fff;width:46px;height:46px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
#sv-like.liked{background:var(--red)}
#sv-stats{position:absolute;bottom:1.5rem;left:1rem;color:#fff;font-size:.8rem;background:rgba(0,0,0,.4);padding:.3rem .65rem;border-radius:20px;cursor:pointer}
.atabs{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1.25rem;border-bottom:2px solid var(--border);padding-bottom:.65rem}
.at{background:none;border:none;padding:.45rem .85rem;border-radius:10px;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:600;font-size:.82rem;color:var(--txt2)}
.at.active{background:var(--blue);color:#fff}.at:hover:not(.active){background:var(--bg3)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.65rem;margin-bottom:1.25rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.85rem;text-align:center}
.sv2{font-family:'Unbounded',sans-serif;font-size:1.5rem;font-weight:900;margin-bottom:.15rem}
.sl{font-size:.7rem;color:var(--txt2)}
.ur{display:flex;align-items:center;gap:.65rem;padding:.65rem;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:.45rem;flex-wrap:wrap}
.uri{flex:1;min-width:0}
.uri .un{font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.uri .us{color:var(--txt2);font-size:.76rem}
.ura{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}
.fr{display:flex;align-items:center;gap:.65rem;padding:.55rem .65rem;border-radius:10px;cursor:pointer}
.fr:hover{background:var(--bg3)}
.cc{display:flex;align-items:center;gap:.85rem;padding:.9rem;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:.65rem;cursor:pointer}
.cc:hover{border-color:var(--blue)}
.cca{width:52px;height:52px;border-radius:12px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.ni2{padding:.8rem;border-bottom:1px solid var(--border);display:flex;gap:.65rem;align-items:flex-start}
.ni2:last-child{border-bottom:none}
.nd{width:8px;height:8px;background:var(--blue);border-radius:50%;margin-top:5px;flex-shrink:0}
.nd.r{background:transparent;border:1px solid var(--border)}
.wlc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:.85rem}
.wlc h1{font-family:'Unbounded',sans-serif;font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.callscr{position:fixed;inset:0;background:#000;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center}
.callscr.active{display:flex}
#vrem{width:100%;height:100%;object-fit:cover;position:absolute}
#vloc{position:absolute;top:1rem;right:1rem;width:110px;height:82px;border-radius:10px;object-fit:cover;border:2px solid var(--blue);background:#111}
.callui{position:relative;z-index:2;text-align:center;background:rgba(0,0,0,.45);padding:1.75rem 2.5rem;border-radius:22px;backdrop-filter:blur(12px)}
.callname{font-family:'Unbounded',sans-serif;font-size:1.4rem;color:#fff;margin-bottom:.4rem}
.callst{color:rgba(255,255,255,.65);margin-bottom:1.75rem;font-size:.9rem}
.callbtns{display:flex;gap:1.25rem;justify-content:center}
.cb{width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.cb.end{background:var(--red);color:#fff}.cb.ctrl{background:rgba(255,255,255,.18);color:#fff}.cb.muted{background:var(--red);color:#fff}
.inc{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:1.1rem 1.35rem;z-index:900;display:none;flex-direction:column;gap:.65rem;min-width:270px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.inc.show{display:flex}
#group-grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:4px;background:#000;z-index:1;padding:4px}
.gtile{position:relative;background:#111;border-radius:8px;overflow:hidden;min-height:120px}
.gtile video{width:100%;height:100%;object-fit:cover;display:block}
.gtile-lbl{position:absolute;bottom:.35rem;left:.5rem;color:#fff;font-size:.72rem;font-weight:700;background:rgba(0,0,0,.5);padding:.1rem .4rem;border-radius:4px}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:800;display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:900px){.rp{display:none}}
@media(max-width:640px){.lnav{position:fixed;top:60px;left:0;bottom:0;z-index:200;transform:translateX(-100%);transition:.25s;width:220px}.lnav.open{transform:translateX(0)}.mtog{display:block}.center{padding:1rem .5rem}}
</style></head><body>
<div id="tw"></div>
<div id="cv"><div id="cb"><h3 id="cv-t"></h3><p id="cv-m"></p><div class="row"><button class="btn bs bsm" id="cv-n">Отмена</button><button class="btn bd bsm" id="cv-y">OK</button></div></div></div>
<div id="iv"><div id="ib"><h3 id="iv-t"></h3><input id="iv-inp" type="text"><div class="row"><button class="btn bs bsm" id="iv-n">Отмена</button><button class="btn bp bsm" id="iv-y">OK</button></div></div></div>
<header>
  <button class="mtog" id="mtog"><i class="fas fa-bars"></i></button>
  <div class="logo" onclick="goPage('feed')">KNB<span>.</span></div>
  <div class="sw"><i class="fas fa-search"></i><input id="si" autocomplete="off" placeholder="Поиск..."><div id="srp"></div></div>
  <div class="hdr-r" id="hdr-r"></div>
</header>
<div class="layout">
  <nav class="lnav" id="lnav">
    <button class="ni active" data-p="feed"><i class="fas fa-home"></i> Главная</button>
    <button class="ni" data-p="profile"><i class="fas fa-user"></i> Профиль</button>
    <button class="ni" data-p="friends"><i class="fas fa-user-friends"></i> Друзья</button>
    <button class="ni" data-p="messages"><i class="fas fa-envelope"></i> Сообщения</button>
    <button class="ni" data-p="communities"><i class="fas fa-users"></i> Сообщества</button>
    <button class="ni" data-p="notifications"><i class="fas fa-bell"></i> Уведомления</button>

<script>
'use strict';
const API='/api',WS_URL=(location.protocol==='https:'?'wss://':'ws://')+location.host,OE='foxi@knb.com';
let me=null,token=localStorage.getItem('knb_t')||null;
let PAGE='feed',ADMTAB='overview',chatId=null,cmtPid=null,postCid=null;
let ws=null,localStream=null,pendingCall=null,muted=false,camOff=false;
let mrec=null,mrChunks=[],voiceCid=null;
let allUsers=[],allPosts=[],allComms=[],allFriends=[],allNotifs=[],allGroups=[],allStories=[];
let commMembers={},onlineUsers=new Set();
let typingTimers={},typingTimer=null,refreshTimer=null;
let pc1=null,callFrom=null,callType1='audio';
let groupPCs={},groupStreams={},callRoom=null;
let storyList=[],storyIdx=0,storyTimer=null;
let forumPosts=[],complaints=[];
const STUN={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
const RANKS={owner:{l:'Владелец',c:'#f59e0b',i:'👑',post:true,manage:true},admin:{l:'Админ',c:'#ef4444',i:'🛡️',post:true,manage:true},moderator:{l:'Модератор',c:'#a855f7',i:'⚡',post:true,manage:false},member:{l:'Участник',c:'#6b7280',i:'👤',post:false,manage:false}};
const SROLES={owner:{l:'Владелец',c:'#f59e0b',i:'👑'},admin:{l:'Админ',c:'#ef4444',i:'🛡️'},moderator:{l:'Модератор',c:'#a855f7',i:'⚡'},helper:{l:'Помощник',c:'#22c55e',i:'🤝'},user:{l:'',c:'',i:''}};
const FCAT={general:{l:'Общее',i:'💬',c:'var(--blue)'},suggestion:{l:'Предложение',i:'💡',c:'var(--yellow)'},bug:{l:'Баг',i:'🐛',c:'var(--red)'},appeal:{l:'Жалоба',i:'⚖️',c:'var(--purple)'},other:{l:'Другое',i:'📌',c:'var(--txt2)'}};
const CSTAT={pending:{l:'Ожидает',c:'var(--yellow)'},reviewing:{l:'Рассматривается',c:'var(--blue)'},resolved:{l:'Решена',c:'var(--green)'},rejected:{l:'Отклонена',c:'var(--red)'}};

// UTILS
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function ago(ts){const d=(Date.now()-new Date(ts))/1000;if(d<60)return'только что';if(d<3600)return~~(d/60)+' мин.';if(d<86400)return~~(d/3600)+' ч.';return new Date(ts).toLocaleDateString('ru-RU');}
const ava=n=>'https://ui-avatars.com/api/?name='+encodeURIComponent(n||'?')+'&background=4f8ef7&color=fff&size=80';
const rf=f=>new Promise((res,rej)=>{const r=new FileReader;r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(f);});
const OM=id=>document.getElementById(id)?.classList.add('open');
const CM=id=>document.getElementById(id)?.classList.remove('open');
const openLB=src=>{document.getElementById('lb-img').src=src;OM('lb');};
const fu=id=>allUsers.find(u=>u.id===id);
const fc=id=>allComms.find(c=>c.id===id);
const isOwner=()=>me?.email===OE;
const getSR=u=>u?.email===OE?'owner':(u?.siteRole||'user');
const isStaff=u=>['owner','admin','moderator','helper'].includes(getSR(u));
function srBadge(u){const r=getSR(u),i=SROLES[r];if(!i||r==='user')return'';return`<span style="font-size:.67rem;font-weight:700;color:${i.c};background:${i.c}18;padding:.1rem .4rem;border-radius:6px">${i.i} ${i.l}</span>`;}
function rkBadge(rank){const r=RANKS[rank];if(!r||rank==='member')return'';return`<span style="font-size:.7rem;font-weight:700;color:${r.c}">${r.i} ${r.l}</span>`;}
function getMRank(cid,uid){const c=fc(cid);if(c&&c.createdBy===uid)return'owner';const m=(commMembers[cid]||[]).find(x=>x.uid===uid);return m?(m.rank||'member'):null;}
function canPost(cid){if(!me)return false;if(isOwner())return true;const c=fc(cid);if(c&&c.createdBy===me.id)return true;const r=getMRank(cid,me.id);return r&&RANKS[r]?.post;}
function canMng(cid){if(!me)return false;if(isOwner())return true;const c=fc(cid);if(c&&c.createdBy===me.id)return true;const r=getMRank(cid,me.id);return r&&RANKS[r]?.manage;}
const cid2=(a,b)=>'chat_'+[a,b].sort().join('_');
function mHtml(m){if(!m)return'';const u=m.url||m,t=m.t||'';if(t.startsWith('video'))return`<video class="pimg" controls src="${u}"></video>`;return`<img class="pimg" src="${u}" onclick="openLB(this.src)" onerror="this.style.display='none'">`;}
function odot(uid,sz='9px'){const on=onlineUsers.has(uid);return`<span class="online-dot${on?'':' off'}" style="width:${sz};height:${sz}"></span>`;}
function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('knb_theme',document.body.classList.contains('light')?'light':'dark');}

// TOAST
function toast(msg,type='info',dur=3200){const w=document.getElementById('tw');const d=document.createElement('div');d.className=`toast ${type}`;d.textContent={'ok':'✅','err':'❌','info':'ℹ️'}[type]+' '+msg;w.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transform='translateX(20px)';setTimeout(()=>d.remove(),300);},dur);}

// CONFIRM/INPUT
function showConfirm(title,text,onYes,yL='OK',cls='bd'){document.getElementById('cv-t').textContent=title;document.getElementById('cv-m').textContent=text||'Действие нельзя отменить.';const y=document.getElementById('cv-y');y.textContent=yL;y.className=`btn ${cls} bsm`;OM('cv');y.onclick=()=>{CM('cv');onYes();};document.getElementById('cv-n').onclick=()=>CM('cv');}
function showInput(title,ph,onOk){document.getElementById('iv-t').textContent=title;const inp=document.getElementById('iv-inp');inp.placeholder=ph||'';inp.value='';OM('iv');setTimeout(()=>inp.focus(),80);document.getElementById('iv-y').onclick=()=>{const v=inp.value.trim();if(!v){toast('Введите значение','err');return;}CM('iv');onOk(v);};document.getElementById('iv-n').onclick=()=>CM('iv');}

// MODAL HELPERS
let curMo=null;
function showModal(title,body){const old=document.getElementById('_mo');if(old)old.remove();const d=document.createElement('div');d.id='_mo';d.className='mo open';d.addEventListener('click',e=>{if(e.target===d)closeModal();});d.innerHTML=`<div class="mb" style="max-width:540px"><button class="mc" onclick="closeModal()"><i class="fas fa-times"></i></button><h2>${title}</h2>${body}</div>`;document.body.appendChild(d);curMo=d;}
function closeModal(){if(curMo){curMo.remove();curMo=null;}const old=document.getElementById('_mo');if(old)old.remove();}

// API
async function api(method,path,body){const opts={method,headers:{'Content-Type':'application/json'}};if(token)opts.headers['Authorization']='Bearer '+token;if(body!==undefined)opts.body=JSON.stringify(body);let r;try{r=await fetch(API+path,opts);}catch{throw new Error('Нет соединения');}let data;try{data=await r.json();}catch{data={};}if(!r.ok)throw new Error(data.error||'Ошибка '+r.status);return data;}
const GET=p=>api('GET',p),POST=(p,b)=>api('POST',p,b),PUT=(p,b)=>api('PUT',p,b),DEL=p=>api('DELETE',p);

async function loadAll(){if(!token)return;try{const[u,p,c,f,n,g,s]=await Promise.all([GET('/users'),GET('/posts'),GET('/communities'),GET('/friendships'),GET('/notifications'),GET('/groups').catch(()=>[]),GET('/stories').catch(()=>[])]);allUsers=u||[];allPosts=p||[];allComms=c||[];allFriends=f||[];allNotifs=n||[];allGroups=g||[];allStories=s||[];}catch(e){console.error('loadAll:',e.message);}}

// WS
function connectWS(){if(!token)return;try{ws=new WebSocket(WS_URL);}catch{setTimeout(connectWS,4000);return;}
ws.onopen=()=>ws.send(JSON.stringify({type:'auth',token}));
ws.onmessage=e=>{let m;try{m=JSON.parse(e.data);}catch{return;}
  if(m.type==='online_list'){onlineUsers=new Set(m.users||[]);renderRP();}
  if(m.type==='user_online'){onlineUsers.add(m.uid);renderRP();}
  if(m.type==='user_offline'){onlineUsers.delete(m.uid);renderRP();}
  if(m.type==='new_post'){allPosts.unshift(m.post);if(PAGE==='feed')renderPage();}
  if(m.type==='new_message'){if(chatId&&m.message.chatId===chatId)appendMsg(m.message);}
  if(m.type==='notification'){allNotifs.unshift({id:'_'+Date.now(),uid:me?.id,text:m.text,read:false,ts:m.ts||new Date().toISOString()});renderHdr();toast(m.text,'info');}
  if(m.type==='typing')showTyping(m.chatId,m.name);
  if(m.type==='call_incoming'){pendingCall=m;showIncoming1(m);}
  if(m.type==='call_answer'&&pc1)pc1.setRemoteDescription(new RTCSessionDescription(m.answer)).catch(()=>{});
  if(m.type==='call_ice'&&pc1)pc1.addIceCandidate(new RTCIceCandidate(m.candidate)).catch(()=>{});
  if(m.type==='call_rejected'){document.getElementById('cs-st').textContent='Отклонено';setTimeout(endCall,1500);}
  if(m.type==='call_ended')endCall();
  if(m.type==='call_room_peers')handleRoomPeers(m.peers);
  if(m.type==='call_room_peer_joined')handlePeerJoined(m.peerId);
  if(m.type==='call_room_peer_left')handlePeerLeft(m.peerId);
  if(m.type==='call_room_signal')handleRoomSignal(m);
  if(m.type==='banned'){toast('Аккаунт заблокирован','err');doLogout();}
  if(m.type==='muted')toast('Вы замьючены','err');
  if(m.type==='verified')me&&(me.verified=true)&&renderHdr();
  if(m.type==='site_role_updated'){me&&(me.siteRole=m.role);renderHdr();renderNav();}
  if(m.type==='friend_request'||m.type==='friend_accepted')loadAll().then(()=>renderPage());
};
ws.onclose=()=>setTimeout(connectWS,3000);ws.onerror=()=>{};}
const wsSend=d=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));};

// TYPING
function showTyping(cId,name){const el=document.getElementById('typing-bar');if(!el||chatId!==cId)return;el.textContent=`${name||'?'} печатает...`;clearTimeout(typingTimers[cId]);typingTimers[cId]=setTimeout(()=>{const e=document.getElementById('typing-bar');if(e)e.textContent='';},3000);}
function sendTyping(cId){clearTimeout(typingTimer);typingTimer=setTimeout(()=>wsSend({type:'typing',chatId:cId}),400);}

// SEARCH
let _sd=null;
function initSearch(){const si=document.getElementById('si'),srp=document.getElementById('srp');si.oninput=e=>{const q=(e.target.value||'').trim();clearTimeout(_sd);if(q.length<2){srp.classList.remove('open');return;}_sd=setTimeout(()=>doSearch(q),200);};si.onkeydown=e=>{if(e.key==='Escape'){srp.classList.remove('open');si.value='';}};document.addEventListener('click',e=>{if(!si.contains(e.target)&&!srp.contains(e.target))srp.classList.remove('open');});}
function doSearch(q){if(!me)return;const srp=document.getElementById('srp'),ql=q.toLowerCase();const users=allUsers.filter(u=>u.name.toLowerCase().includes(ql)||u.username.toLowerCase().includes(ql)).slice(0,4);const comms=allComms.filter(c=>c.name.toLowerCase().includes(ql)).slice(0,3);if(!users.length&&!comms.length){srp.classList.remove('open');return;}let h='';if(users.length){h+='<div class="srp-sep">ЛЮДИ</div>';h+=users.map(u=>`<div class="srp-item" onclick="srp.classList.remove('open');viewUser('${u.id}')"><div style="position:relative"><img src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div><div><div style="font-weight:700;font-size:.85rem">${esc(u.name)}${u.verified?' ✅':''}${srBadge(u)}</div><div style="color:var(--txt2);font-size:.74rem">${esc(u.username)}</div></div></div>`).join('');}if(comms.length){h+='<div class="srp-sep">СООБЩЕСТВА</div>';h+=comms.map(c=>`<div class="srp-item" onclick="srp.classList.remove('open');viewComm('${c.id}')"><img src="${c.avatar||ava(c.name)}" style="border-radius:8px"><div style="font-weight:700">${esc(c.name)}</div></div>`).join('');}srp.innerHTML=h;srp.classList.add('open');}

// RENDER
function render(){renderHdr();renderNav();renderRP();renderPage();}
function renderHdr(){const el=document.getElementById('hdr-r');if(!el)return;if(!me){el.innerHTML=`<button class="btn bp bsm" onclick="OM('m-auth');showLi()">Войти</button>`;return;}const ns=allNotifs.filter(n=>!n.read).length;el.innerHTML=`<button class="hbtn" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i></button><button class="hbtn" onclick="goPage('notifications')" style="position:relative"><i class="fas fa-bell"></i>${ns?`<span class="bdg">${ns}</span>`:''}</button><div style="position:relative;cursor:pointer" onclick="goPage('profile')"><img class="hava" src="${me.avatar||ava(me.name)}" onerror="this.src='${ava(me.name)}'">${odot(me.id)}</div>`;}
function renderNav(){document.querySelectorAll('.ni[data-p]').forEach(b=>b.classList.toggle('active',b.dataset.p===PAGE));const ab=document.getElementById('admbtn');if(ab)ab.style.display=isOwner()?'flex':'none';}
function renderRP(){const el=document.getElementById('rps');if(!me||!el)return;const list=allUsers.filter(u=>u.id!==me.id).sort((a,b)=>(onlineUsers.has(b.id)?1:0)-(onlineUsers.has(a.id)?1:0)).slice(0,8);el.innerHTML=list.map(u=>`<div class="fr" onclick="viewUser('${u.id}')"><div style="position:relative"><img style="width:30px;height:30px;border-radius:50%;object-fit:cover" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div><div><div style="font-weight:700;font-size:.82rem">${esc(u.name)}</div><div style="color:${onlineUsers.has(u.id)?'var(--green)':'var(--txt2)'};font-size:.7rem">${onlineUsers.has(u.id)?'● онлайн':'○ офлайн'}</div></div></div>`).join('')||'<p style="color:var(--txt2);font-size:.82rem">Нет пользователей</p>';}
function renderPage(){const c=document.getElementById('cnt');if(!c)return;if(!me){c.innerHTML=`<div class="wlc"><h1>KNB</h1><p style="color:var(--txt2);max-width:340px;line-height:1.6">Социальная сеть нового поколения</p><div style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center"><button class="btn bp" onclick="OM('m-auth');showLi()">Войти</button><button class="btn bs" onclick="OM('m-auth');showReg()">Регистрация</button></div></div>`;return;}
switch(PAGE){case'feed':renderFeed();break;case'profile':c.innerHTML=buildProfile(me,true);break;case'friends':c.innerHTML=buildFriends();break;case'messages':renderMessages();break;case'communities':c.innerHTML=buildComms();break;case'notifications':c.innerHTML=buildNotifs();markNotifsRead();break;case'settings':c.innerHTML=buildSettings();break;case'admin':renderAdmin();break;}}
function goPage(p){if(p==='forum'){goForum();return;}if(p==='complaints'){goComplaints();return;}PAGE=p;if(p!=='messages'){chatId=null;clearInterval(refreshTimer);}renderNav();renderHdr();renderPage();}
// STORIES
function storiesBar(){const by={};[...allStories].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).forEach(s=>{if(!by[s.authorId])by[s.authorId]=[];by[s.authorId].push(s);});let h=`<div class="stories-row"><div style="flex-shrink:0;width:72px;display:flex;flex-direction:column;align-items:center;gap:.3rem"><label class="story-add" title="История"><i class="fas fa-plus"></i><input type="file" accept="image/*,video/*" style="display:none" onchange="uploadStory(this)"></label><span class="story-label">История</span></div>`;Object.keys(by).forEach(uid=>{const u=fu(uid);if(!u)return;const seen=by[uid].every(s=>s.viewed);h+=`<div class="story-item" onclick="openStories('${uid}')"><div class="story-ring${seen?' seen':''}"><img src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'" alt></div><span class="story-label">${esc(u.id===me.id?'Вы':u.name.split(' ')[0])}</span></div>`;});return h+`</div>`;}
async function uploadStory(input){const f=input.files[0];if(!f)return;input.value='';let mediaUrl;try{mediaUrl=await rf(f);}catch{toast('Ошибка файла','err');return;}try{const s=await POST('/stories',{mediaUrl,mediaType:f.type});allStories.unshift({...s,author:me,viewCount:0,likeCount:0,liked:false,viewed:false});renderPage();toast('История опубликована!','ok');}catch(e){toast(e.message,'err');}}
function openStories(uid){const by={};[...allStories].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).forEach(s=>{if(!by[s.authorId])by[s.authorId]=[];by[s.authorId].push(s);});if(!by[uid])return;storyList=by[uid];showStoryAt(0);document.getElementById('story-viewer').classList.add('open');}
function showStoryAt(idx){clearTimeout(storyTimer);if(idx>=storyList.length){closeStoryViewer();return;}storyIdx=idx;const s=storyList[idx];const sv=document.getElementById('story-viewer');const media=document.getElementById('sv-media');const isV=s.mediaType?.startsWith('video');if(isV){media.style.display='none';let v=document.getElementById('sv-vid');if(!v){v=document.createElement('video');v.id='sv-vid';v.autoplay=true;v.playsInline=true;v.style.cssText='max-width:420px;max-height:75vh;border-radius:16px;object-fit:contain';sv.insertBefore(v,media.nextSibling);}v.src=s.mediaUrl;v.style.display='';}else{media.src=s.mediaUrl;media.style.display='';const v=document.getElementById('sv-vid');if(v){v.pause();v.style.display='none';}}const u=fu(s.authorId)||s.author;document.getElementById('sv-user').innerHTML=`<img src="${u?.avatar||ava(u?.name||'?')}" style="width:34px;height:34px;border-radius:50%;object-fit:cover"><span style="color:#fff;font-weight:700;font-size:.88rem">${esc(u?.name||'?')}</span><span style="color:rgba(255,255,255,.6);font-size:.75rem">${ago(s.ts)}</span>`;document.getElementById('sv-like').classList.toggle('liked',!!s.liked);const isMine=s.authorId===me.id;document.getElementById('sv-stats').style.display=isMine?'':'none';document.getElementById('sv-vc').textContent=s.viewCount||0;document.getElementById('sv-bar').innerHTML=storyList.map((_,i)=>`<div class="sv-seg"><div class="sv-seg-fill" id="sv-f${i}" style="width:${i<idx?100:0}%"></div></div>`).join('');if(!s.viewed){s.viewed=true;POST('/stories/'+s.id+'/view').catch(()=>{});}const dur=isV?15000:5000;let elapsed=0;const fill=document.getElementById('sv-f'+idx);storyTimer=setInterval(()=>{elapsed+=50;const pct=Math.min(elapsed/dur*100,100);if(fill)fill.style.width=pct+'%';if(elapsed>=dur){clearInterval(storyTimer);showStoryAt(idx+1);}},50);}
function closeStoryViewer(){clearTimeout(storyTimer);document.getElementById('story-viewer').classList.remove('open');const v=document.getElementById('sv-vid');if(v)v.pause();storyList=[];storyIdx=0;}
async function likeCurrentStory(){const s=storyList[storyIdx];if(!s)return;try{const r=await POST('/stories/'+s.id+'/like');s.liked=r.liked;s.likeCount=(s.likeCount||0)+(r.liked?1:-1);document.getElementById('sv-like').classList.toggle('liked',r.liked);}catch(e){toast(e.message,'err');}}
async function showStoryStats(){const s=storyList[storyIdx];if(!s||s.authorId!==me.id)return;try{const st=await GET('/stories/'+s.id+'/stats');const old=document.getElementById('_st');if(old)old.remove();const d=document.createElement('div');d.id='_st';d.className='mo open';d.addEventListener('click',e=>{if(e.target===d)d.remove();});d.innerHTML=`<div class="mb" style="max-width:400px"><button class="mc" onclick="document.getElementById('_st').remove()"><i class="fas fa-times"></i></button><h2>📊 Статистика</h2><div style="display:flex;gap:1.5rem;margin-bottom:1rem"><div style="text-align:center"><div style="font-size:1.5rem;font-weight:900;color:var(--blue)">${st.views.length}</div><div style="color:var(--txt2);font-size:.8rem">Просмотры</div></div><div style="text-align:center"><div style="font-size:1.5rem;font-weight:900;color:var(--red)">${st.likes.length}</div><div style="color:var(--txt2);font-size:.8rem">Лайки</div></div></div><div style="font-weight:700;font-size:.8rem;color:var(--txt2);margin-bottom:.5rem">ЛАЙКИ</div>${st.likes.map(u=>`<div class="fr"><img src="${u.avatar||ava(u.name)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover"><span style="font-size:.85rem;font-weight:600">${esc(u.name)}</span></div>`).join('')||'<p style="color:var(--txt2);font-size:.82rem">Никто</p>'}<div style="font-weight:700;font-size:.8rem;color:var(--txt2);margin:.65rem 0 .5rem">ПРОСМОТРЫ</div>${st.views.map(v=>`<div class="fr"><img src="${v.avatar||ava(v.name||'?')}" style="width:28px;height:28px;border-radius:50%;object-fit:cover"><span style="font-size:.85rem;font-weight:600">${esc(v.name||'?')}</span></div>`).join('')||'<p style="color:var(--txt2);font-size:.82rem">Никто</p>'}</div>`;document.body.appendChild(d);}catch(e){toast(e.message,'err');}}
document.addEventListener('click',e=>{const sv=document.getElementById('story-viewer');if(!sv.classList.contains('open'))return;if(e.target.closest('#sv-close')||e.target.closest('#sv-like')||e.target.closest('#sv-stats')||e.target.closest('#sv-user'))return;const rect=sv.getBoundingClientRect();if(e.clientX<rect.width/2)showStoryAt(Math.max(0,storyIdx-1));else showStoryAt(storyIdx+1);},{passive:true});

// FEED
function renderFeed(){const c=document.getElementById('cnt');let h=`<button class="btn bp" onclick="openPostModal()" style="margin-bottom:1rem;width:100%"><i class="fas fa-plus"></i> Создать пост</button>`;h+=storiesBar();const sorted=[...allPosts].sort((a,b)=>new Date(b.ts)-new Date(a.ts));if(!sorted.length){c.innerHTML=h+'<p style="color:var(--txt2);text-align:center;padding:3rem 0">Нет постов 🚀</p>';return;}sorted.forEach(p=>{const isCom=!!p.communityId;const au=isCom?fc(p.communityId):fu(p.authorId);if(!au)return;h+=buildPostCard(p,au,isCom);});c.innerHTML=h;}
function buildPostCard(p,au,isCom){const liked=(p.likes||[]).includes(me.id);const canDel=isOwner()||p.authorId===me.id;const rank=isCom?getMRank(p.communityId,p.authorId):null;return`<div class="pc"><div class="ph" onclick="${isCom?`viewComm('${p.communityId}')`:`viewUser('${p.authorId}')`}"><div style="position:relative"><img class="ava" src="${au.avatar||ava(au.name)}" onerror="this.src='${ava(au.name)}'">${!isCom?odot(p.authorId):''}</div><div><div class="pan">${esc(au.name)}${au.verified?' <i class="fas fa-check-circle vc"></i>':''}${rank&&rank!=='member'?' '+rkBadge(rank):''}</div><div class="pm">${isCom?'<i class="fas fa-users" style="font-size:.7rem"></i> · ':''}${ago(p.ts)}</div></div></div>${p.text?`<div class="ptxt">${esc(p.text)}</div>`:''}${mHtml(p.media)}<div class="pact"><button class="ab${liked?' liked':''}" onclick="likePost('${p.id}')"><i class="fas fa-heart"></i> ${(p.likes||[]).length}</button><button class="ab" onclick="showCmts('${p.id}')"><i class="fas fa-comment"></i> ${(p.comments||[]).length}</button>${canDel?`<button class="ab" onclick="showConfirm('Удалить пост?','',()=>delPost('${p.id}'),'Удалить','bd')"><i class="fas fa-trash"></i></button>`:''}</div></div>`;}
function openPostModal(cid=null){postCid=cid;const cw=document.getElementById('pt-cw');if(cid&&cw){const c=fc(cid);cw.style.display='';document.getElementById('pt-cn').textContent=c?c.name:'';}else if(cw)cw.style.display='none';document.getElementById('pt-tx').value='';document.getElementById('pt-mf').value='';OM('m-post');}
async function publishPost(){const text=(document.getElementById('pt-tx').value||'').trim();const file=document.getElementById('pt-mf').files[0];if(!text&&!file){toast('Добавьте текст или медиа','err');return;}const btn=document.getElementById('pt-b');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';let media=null;if(file)try{media={url:await rf(file),t:file.type};}catch{toast('Ошибка файла','err');btn.disabled=false;btn.innerHTML='Опубликовать';return;}try{const post=await POST('/posts',{text,media,communityId:postCid||undefined});allPosts.unshift(post);CM('m-post');postCid=null;renderPage();toast('Опубликовано!','ok');}catch(e){toast(e.message,'err');}btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Опубликовать';}
async function likePost(pid){try{const upd=await POST('/posts/'+pid+'/like');const i=allPosts.findIndex(p=>p.id===pid);if(i>=0)allPosts[i]=upd;renderPage();}catch(e){toast(e.message,'err');}}
async function delPost(pid){try{await DEL('/posts/'+pid);allPosts=allPosts.filter(p=>p.id!==pid);renderPage();toast('Удалено','ok');}catch(e){toast(e.message,'err');}}

// COMMENTS
function showCmts(pid){cmtPid=pid;const p=allPosts.find(x=>x.id===pid);if(!p)return;drawCmts(p);OM('m-cmt');}
function drawCmts(p){const el=document.getElementById('cmt-l');if(!el)return;el.innerHTML=(p.comments||[]).map(c=>{const u=fu(c.uid);const canDel=me&&(c.uid===me.id||isOwner()||p.authorId===me.id);return`<div style="display:flex;gap:.5rem;margin-bottom:.85rem;align-items:flex-start"><img style="width:30px;height:30px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0" src="${u?u.avatar||ava(u.name):ava('?')}" onclick="viewUser('${c.uid}');CM('m-cmt')" onerror="this.src='${ava('?')}'"><div style="flex:1;background:var(--bg3);border-radius:12px;padding:.5rem .75rem;min-width:0"><div style="font-weight:700;font-size:.8rem">${u?esc(u.name):'?'}${u&&u.verified?' ✅':''}</div><div style="font-size:.88rem;margin:.1rem 0;word-break:break-word">${esc(c.text)}</div><div style="color:var(--txt2);font-size:.7rem">${ago(c.ts)}</div></div>${canDel?`<button onclick="showConfirm('Удалить?','',()=>delCmt('${p.id}','${c.id}'),'Удалить','bd')" style="background:none;border:none;color:var(--txt2);cursor:pointer;flex-shrink:0;padding:.2rem;font-size:.82rem" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--txt2)'"><i class="fas fa-times"></i></button>`:''}</div>`;}).join('')||'<p style="color:var(--txt2);text-align:center;font-size:.84rem;padding:1rem 0">Нет комментариев</p>';}
async function delCmt(pid,cid){try{const upd=await DEL('/posts/'+pid+'/comment/'+cid);const i=allPosts.findIndex(p=>p.id===pid);if(i>=0)allPosts[i]=upd;drawCmts(upd);toast('Удалено','ok');}catch(e){toast(e.message,'err');}}
async function addCmt(){const inp=document.getElementById('cmt-i');const text=(inp.value||'').trim();if(!text||!cmtPid)return;try{const upd=await POST('/posts/'+cmtPid+'/comment',{text});const i=allPosts.findIndex(p=>p.id===cmtPid);if(i>=0)allPosts[i]=upd;drawCmts(upd);inp.value='';}catch(e){toast(e.message,'err');}}

// PROFILE
function buildProfile(user,isSelf){const fs=allFriends.filter(f=>f.status==='accepted');const isFriend=fs.some(f=>(f.fromId===me.id&&f.toId===user.id)||(f.fromId===user.id&&f.toId===me.id));const outReq=allFriends.find(f=>f.fromId===me.id&&f.toId===user.id&&f.status==='pending');const incReq=allFriends.find(f=>f.fromId===user.id&&f.toId===me.id&&f.status==='pending');const isF=!!user.isFollowing;const posts=allPosts.filter(p=>p.authorId===user.id&&!p.communityId).sort((a,b)=>new Date(b.ts)-new Date(a.ts));const on=onlineUsers.has(user.id);const banSt=user.banner?`background-image:url('${user.banner}');background-size:cover;background-position:center;`:'background:linear-gradient(135deg,var(--blue),var(--purple));';return`<div class="pban" style="${banSt}"></div><div class="paw"><div style="position:relative"><img class="pava" src="${user.avatar||ava(user.name)}" onerror="this.src='${ava(user.name)}'">${odot(user.id,'13px')}</div><div style="display:flex;gap:.4rem;flex-wrap:wrap;padding-bottom:.5rem">${isSelf?`<button class="btn bs bsm" onclick="goPage('settings')"><i class="fas fa-pen"></i> Редактировать</button>`:''}${!isSelf&&!isFriend&&!outReq&&!incReq?`<button class="btn bp bsm" onclick="addFriend('${user.id}')"><i class="fas fa-user-plus"></i> Добавить</button>`:''}${!isSelf&&outReq?`<button class="btn bs bsm" disabled>Заявка отправлена</button>`:''}${!isSelf&&incReq?`<button class="btn bg2c bsm" onclick="accFriend('${incReq.id}')"><i class="fas fa-check"></i> Принять</button>`:''}${!isSelf&&isFriend?`<button class="btn bs bsm" disabled><i class="fas fa-check"></i> В друзьях</button>`:''}${!isSelf?`<button class="btn ${isF?'bs':'bp'} bsm" onclick="toggleFollow('${user.id}')"><i class="fas fa-${isF?'bell-slash':'bell'}"></i> ${isF?'Отписаться':'Подписаться'}</button><button class="btn bs bsm" onclick="startChat('${user.id}')"><i class="fas fa-envelope"></i></button><button class="btn bs bsm" onclick="startDMCall('${user.id}','audio')"><i class="fas fa-phone"></i></button><button class="btn bs bsm" onclick="startDMCall('${user.id}','video')"><i class="fas fa-video"></i></button>`:''}${!isSelf&&(isOwner()||me.siteRole==='admin')?`<button class="btn bd bsm" onclick="showMuteDialog('${user.id}','${esc(user.name)}')">🔇 Мьют</button><button class="btn bd bsm" onclick="showBanDialog('${user.id}','${esc(user.name)}')">🚫 Бан</button>`:''}
</div></div><div class="pinfo"><div class="pname">${esc(user.name)}${user.verified?' <i class="fas fa-check-circle vc"></i>':''} ${srBadge(user)}</div><div class="puname">${esc(user.username)} · <span style="color:${on?'var(--green)':'var(--txt2)'}">${on?'● онлайн':'○ офлайн'}</span></div>${user.bio?`<p class="pbio">${esc(user.bio)}</p>`:''}
<div style="display:flex;gap:1.5rem;margin-top:.5rem;flex-wrap:wrap"><div><b>${posts.length}</b> <span style="color:var(--txt2);font-size:.84rem">постов</span></div><div><b>${user.followersCount||0}</b> <span style="color:var(--txt2);font-size:.84rem;cursor:pointer" onclick="showUserList2('followers','${user.id}')">подписчиков</span></div><div><b>${user.followingCount||0}</b> <span style="color:var(--txt2);font-size:.84rem;cursor:pointer" onclick="showUserList2('following','${user.id}')">подписок</span></div></div></div>
<h3 style="font-family:'Unbounded',sans-serif;font-size:.82rem;margin:.5rem 0 1rem">Посты</h3>${posts.map(p=>`<div class="pc">${p.text?`<div class="ptxt">${esc(p.text)}</div>`:''}${mHtml(p.media)}<div style="color:var(--txt2);font-size:.77rem;margin-top:.4rem">${ago(p.ts)} · ❤️ ${(p.likes||[]).length} · 💬 ${(p.comments||[]).length}</div></div>`).join('')||'<p style="color:var(--txt2)">Нет постов</p>'}`;}
function viewUser(uid){const u=allUsers.find(x=>x.id===uid);if(!u)return;document.getElementById('cnt').innerHTML=buildProfile(u,u.id===me.id);document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));}
async function toggleFollow(uid){try{const r=await POST('/users/'+uid+'/follow');const u=allUsers.find(x=>x.id===uid);if(u){u.isFollowing=r.following;u.followersCount=(u.followersCount||0)+(r.following?1:-1);}viewUser(uid);toast(r.following?'Подписались':'Отписались','ok');}catch(e){toast(e.message,'err');}}
async function showUserList2(type,uid){try{const users=await GET('/users/'+uid+'/'+type);const d=document.createElement('div');d.className='mo open';d.addEventListener('click',e=>{if(e.target===d)d.remove();});d.innerHTML=`<div class="mb" style="max-width:400px"><button class="mc" onclick="this.closest('.mo').remove()"><i class="fas fa-times"></i></button><h2>${type==='followers'?'Подписчики':'Подписки'}</h2>${users.map(u=>`<div class="fr" onclick="this.closest('.mo').remove();viewUser('${u.id}')"><img src="${u.avatar||ava(u.name)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover"><div><div style="font-weight:700;font-size:.87rem">${esc(u.name)}</div><div style="color:var(--txt2);font-size:.75rem">${esc(u.username)}</div></div></div>`).join('')||'<p style="color:var(--txt2)">Пусто</p>'}</div>`;document.body.appendChild(d);}catch(e){toast(e.message,'err');}}
async function addFriend(uid){try{const f=await POST('/friendships',{to:uid});allFriends.push(f);toast('Заявка отправлена','ok');viewUser(uid);}catch(e){toast(e.message,'err');}}
async function accFriend(fid){try{await PUT('/friendships/'+fid+'/accept');await loadAll();me=allUsers.find(u=>u.id===me.id)||me;renderPage();toast('Теперь вы друзья!','ok');}catch(e){toast(e.message,'err');}}
function showMuteDialog(uid,name){showModal(`🔇 Мьют: ${name}`,`<div class="fg"><label>Причина</label><input id="mu-r" placeholder="Причина..."></div><div class="fg"><label>Часов (0 = навсегда)</label><input id="mu-d" type="number" value="24" min="0"></div><button class="btn bp" onclick="doMute('${uid}')">Замьютить</button>`);}
async function doMute(uid){const reason=document.getElementById('mu-r').value.trim();const dur=parseInt(document.getElementById('mu-d').value)||0;try{await POST('/admin/users/'+uid+'/mute',{reason,duration:dur||null});closeModal();await loadAll();renderPage();toast('Замьючен','ok');}catch(e){toast(e.message,'err');}}
function showBanDialog(uid,name){showModal(`🚫 Бан: ${name}`,`<div class="fg"><label>Причина</label><input id="ban-r" placeholder="Причина..."></div><div class="fg"><label>Часов (0 = навсегда)</label><input id="ban-d" type="number" value="0" min="0"></div><button class="btn bd" onclick="doBan('${uid}')">Заблокировать</button>`);}
async function doBan(uid){const reason=document.getElementById('ban-r').value.trim();const dur=parseInt(document.getElementById('ban-d').value)||0;try{await POST('/admin/users/'+uid+'/ban',{reason,duration:dur||null});closeModal();await loadAll();renderPage();toast('Заблокирован','ok');}catch(e){toast(e.message,'err');}}
// FRIENDS
function buildFriends(){const acc=allFriends.filter(f=>f.status==='accepted');const friends=acc.filter(f=>f.fromId===me.id||f.toId===me.id).map(f=>fu(f.fromId===me.id?f.toId:f.fromId)).filter(Boolean);const inc=allFriends.filter(f=>f.toId===me.id&&f.status==='pending').map(f=>({...f,user:fu(f.fromId)})).filter(f=>f.user);let h=`<h2 style="font-family:'Unbounded',sans-serif;font-size:1rem;margin-bottom:1.5rem">Друзья</h2>`;if(inc.length){h+=`<p style="font-weight:700;font-size:.8rem;color:var(--txt2);margin-bottom:.65rem">ВХОДЯЩИЕ (${inc.length})</p>`;h+=inc.map(r=>`<div class="ur"><div style="position:relative"><img class="ava" src="${r.user.avatar||ava(r.user.name)}" onerror="this.src='${ava(r.user.name)}'">${odot(r.user.id)}</div><div class="uri"><div class="un">${esc(r.user.name)}</div><div class="us">${esc(r.user.username)}</div></div><div class="ura"><button class="btn bg2c bsm" onclick="accFriend('${r.id}')"><i class="fas fa-check"></i></button><button class="btn bs bsm" onclick="rejFriend('${r.id}')"><i class="fas fa-times"></i></button></div></div>`).join('');h+='<div class="nsep"></div>';}h+=`<p style="font-weight:700;font-size:.8rem;color:var(--txt2);margin-bottom:.65rem">МОИ ДРУЗЬЯ (${friends.length})</p>`;h+=friends.map(u=>`<div class="ur"><div style="position:relative"><img class="ava" src="${u.avatar||ava(u.name)}" onerror="this.src='${ava(u.name)}'">${odot(u.id)}</div><div class="uri" style="cursor:pointer" onclick="viewUser('${u.id}')"><div class="un">${esc(u.name)}${u.verified?' ✅':''}</div><div class="us">${esc(u.username)} · <span style="color:${onlineUsers.has(u.id)?'var(--green)':'var(--txt2)'}">${onlineUsers.has(u.id)?'онлайн':'офлайн'}</span></div></div><div class="ura"><button class="btn bs bsm" onclick="startChat('${u.id}')"><i class="fas fa-envelope"></i></button><button class="btn bs bsm" onclick="startDMCall('${u.id}','audio')"><i class="fas fa-phone"></i></button><button class="btn bs bsm" style="color:var(--red)" onclick="showConfirm('Удалить из друзей?','',()=>remFriend('${u.id}'),'Удалить','bd')"><i class="fas fa-user-minus"></i></button></div></div>`).join('')||'<p style="color:var(--txt2)">Нет друзей</p>';return h;}
async function rejFriend(fid){try{await DEL('/friendships/'+fid);allFriends=allFriends.filter(f=>f.id!==fid);renderPage();}catch(e){toast(e.message,'err');}}

function renderMessages(){clearInterval(refreshTimer);const c=document.getElementById('cnt');if(chatId){c.innerHTML=buildChatUI(chatId);loadChatMsgs(chatId);refreshTimer=setInterval(()=>{if(chatId&&PAGE==='messages')refreshChatMsgs(chatId);},5000);}else{c.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem"><h2 style="font-family:'Unbounded',sans-serif;font-size:1rem">Сообщения</h2><button class="btn bs bsm" onclick="askCreateGroup()"><i class="fas fa-users"></i> Группа</button></div><div id="chat-list"></div>`;renderChatList();}}
function renderChatList(){const el=document.getElementById('chat-list');if(!el)return;const acc=allFriends.filter(f=>f.status==='accepted');const fIds=acc.filter(f=>f.fromId===me.id||f.toId===me.id).map(f=>f.fromId===me.id?f.toId:f.fromId);const items=[];fIds.forEach(uid=>{const u=fu(uid);if(u)items.push({id:cid2(me.id,uid),title:u.name,user:u,type:'dm'});});allGroups.forEach(g=>items.push({id:g.id,title:g.name,type:'group'}));allComms.forEach(comm=>{const r=getMRank(comm.id,me.id);if(r)items.push({id:'cc_'+comm.id,title:comm.name,type:'comm',rank:r});});if(!items.length){el.innerHTML='<p style="color:var(--txt2)">Нет диалогов. Добавь друзей!</p>';return;}el.innerHTML=items.map(it=>{const avEl=it.user?`<div style="position:relative"><img class="ava" src="${it.user.avatar||ava(it.user.name)}" onerror="this.src='${ava(it.user.name)}'">${odot(it.user.id)}</div>`:`<div class="ava" style="background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem">${it.type==='group'?'👥':'🏘'}</div>`;return`<div class="ur" style="cursor:pointer" onclick="openChat('${it.id}')">${avEl}<div class="uri"><div class="un">${esc(it.title)}</div>${it.type==='dm'&&it.user?`<div style="color:${onlineUsers.has(it.user.id)?'var(--green)':'var(--txt2)'};font-size:.72rem">${onlineUsers.has(it.user.id)?'● онлайн':'○ офлайн'}</div>`:it.rank?`<div style="font-size:.72rem">${rkBadge(it.rank)}</div>`:''}</div>${it.type==='group'?`<button class="btn bs bsm" onclick="event.stopPropagation();startGroupCall('${it.id}','audio')"><i class="fas fa-phone"></i></button>`:''}</div>`;}).join('');}
function buildChatUI(cid){const info=getChatInfo(cid);const isCom=cid.startsWith('cc_');const cId=isCom?cid.replace('cc_',''):null;const canW=!isCom||canPost(cId);const on=info.other&&onlineUsers.has(info.other.id);const avEl=info.other?`<div style="position:relative"><img class="avsm" src="${info.other.avatar||ava(info.other.name)}" onerror="this.src='${ava(info.other.name)}'">${odot(info.other.id)}</div>`:`<div class="avsm" style="background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;border-radius:50%">${info.isGroup?'👥':'🏘'}</div>`;const cbtns=info.other?`<button class="btn bs bsm" onclick="startDMCall('${info.other.id}','audio')"><i class="fas fa-phone"></i></button><button class="btn bs bsm" onclick="startDMCall('${info.other.id}','video')"><i class="fas fa-video"></i></button>`:info.isGroup?`<button class="btn bs bsm" onclick="startGroupCall('${cid}','audio')"><i class="fas fa-phone"></i></button>`:'';;const inp=canW?`<div class="ciw"><div class="cim"><input id="ci" placeholder="Написать..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${cid}');}" oninput="sendTyping('${cid}')"><label class="cib"><i class="fas fa-image"></i><input type="file" accept="image/*" style="display:none" onchange="sendImg(this,'${cid}')"></label><button class="cib" id="vbtn" onmousedown="startVoice('${cid}')" onmouseup="stopVoice()" ontouchstart="startVoice('${cid}')" ontouchend="stopVoice()"><i class="fas fa-microphone"></i></button></div><button class="sbtn" onclick="sendMsg('${cid}')"><i class="fas fa-paper-plane"></i></button></div>`:`<div style="padding:.7rem;background:var(--bg2);border-top:1px solid var(--border);text-align:center;color:var(--txt2);font-size:.84rem">🔒 Только Admin/Mod могут писать</div>`;return`<button class="btn bs bsm" style="margin-bottom:.65rem" onclick="chatId=null;clearInterval(refreshTimer);goPage('messages')"><i class="fas fa-arrow-left"></i> Назад</button><div class="cw"><div class="chdr">${avEl}<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.92rem">${esc(info.title)}${on?`<span style="color:var(--green);font-size:.72rem;margin-left:.4rem">● онлайн</span>`:''}</div></div>${cbtns}${info.isGroup?`<button class="btn bs bsm" onclick="askAddToGroup('${cid}')"><i class="fas fa-user-plus"></i></button>`:''}</div><div class="cmsg" id="cmsg"></div><div class="typing-bar" id="typing-bar"></div>${inp}</div>`;}
async function loadChatMsgs(cid){const el=document.getElementById('cmsg');if(!el)return;el.innerHTML='<div style="text-align:center;padding:2rem"><span class="spin"></span></div>';try{const msgs=await GET('/messages?chatId='+encodeURIComponent(cid));const info=getChatInfo(cid);if(!msgs.length){el.innerHTML='<p style="text-align:center;color:var(--txt2);padding:2rem 0">Напишите первым!</p>';return;}el.innerHTML=msgs.map(m=>buildMsgHtml(m,info,cid)).join('');el.scrollTop=el.scrollHeight;}catch(e){el.innerHTML=`<p style="color:var(--red);padding:1rem">${esc(e.message)}</p>`;}}
async function refreshChatMsgs(cid){try{const msgs=await GET('/messages?chatId='+encodeURIComponent(cid));const el=document.getElementById('cmsg');if(!el)return;const info=getChatInfo(cid);const atBot=el.scrollHeight-el.scrollTop-el.clientHeight<60;el.innerHTML=msgs.map(m=>buildMsgHtml(m,info,cid)).join('');if(atBot)el.scrollTop=el.scrollHeight;}catch{}}
function buildMsgHtml(m,info,cid){const isMe=m.senderId===me.id;const sender=fu(m.senderId);const showN=!isMe&&(info.isGroup||info.isComm);const rank=info.commId?getMRank(info.commId,m.senderId):null;return`<div class="mw ${isMe?'me':'them'}">${showN?`<div class="mauth">${sender?esc(sender.name):'?'}${rank&&rank!=='member'?' '+rkBadge(rank):''}</div>`:''}<div class="msg ${isMe?'me':'them'}">${m.text?`<div>${esc(m.text)}</div>`:''}${m.img?`<img class="mimg" src="${m.img}" onclick="openLB(this.src)">`:''}${m.voice?`<div style="display:flex;align-items:center;gap:.5rem;margin-top:.3rem"><i class="fas fa-microphone" style="font-size:.82rem"></i><audio controls src="${m.voice}" style="height:26px;max-width:170px"></audio></div>`:''}<div class="mtime">${ago(m.ts)}</div>${isMe?`<button class="mdel" onclick="showConfirm('Удалить?','',()=>delMsg('${m.id}','${cid}'))"><i class="fas fa-times"></i></button>`:''}</div></div>`;}
function appendMsg(m){const el=document.getElementById('cmsg');if(!el||!chatId)return;const info=getChatInfo(chatId);el.insertAdjacentHTML('beforeend',buildMsgHtml(m,info,chatId));el.scrollTop=el.scrollHeight;}
async function sendMsg(cid){const inp=document.getElementById('ci');if(!inp)return;const text=inp.value.trim();if(!text)return;inp.value='';try{const msg=await POST('/messages',{chatId:cid,text});appendMsg(msg);}catch(e){toast(e.message,'err');inp.value=text;}}
async function sendImg(input,cid){const f=input.files[0];if(!f)return;input.value='';let img;try{img=await rf(f);}catch{toast('Ошибка','err');return;}try{const msg=await POST('/messages',{chatId:cid,img});appendMsg(msg);}catch(e){toast(e.message,'err');}}

function startVoice(cid){if(!navigator.mediaDevices){toast('Нет микрофона','err');return;}navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{voiceCid=cid;mrChunks=[];const btn=document.getElementById('vbtn');if(btn)btn.classList.add('rec');mrec=new MediaRecorder(stream);mrec.ondataavailable=e=>{if(e.data.size>0)mrChunks.push(e.data);};mrec.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());const btn=document.getElementById('vbtn');if(btn)btn.classList.remove('rec');if(!mrChunks.length)return;const blob=new Blob(mrChunks,{type:'audio/webm'});let voice;try{voice=await rf(blob);}catch{return;}try{const msg=await POST('/messages',{chatId:voiceCid,voice});appendMsg(msg);}catch(e){toast(e.message,'err');}};mrec.start();}).catch(()=>toast('Нет доступа','err'));}

class="ph" onclick="viewUser('${p.authorId}')"><img class="avsm" src="${au?au.avatar||ava(au.name):ava('?')}" onerror="this.src='${ava('?')}'"><div><div class="pan">${au?esc(au.name):'?'}${au&&au.verified?' ✅':''}${ar&&ar!=='member'?' '+rkBadge(ar):''}</div><div class="pm">${ago(p.ts)}</div></div></div>${p.text?`<div class="ptxt">${esc(p.text)}</div>`:''}${mHtml(p.media)}<div class="pact"><button class="ab${(p.likes||[]).includes(me.id)?' liked':''}" onclick="likePost('${p.id}')"><i class="fas fa-heart"></i> ${(p.likes||[]).length}</button><button class="ab" onclick="showCmts('${p.id}')"><i class="fas fa-comment"></i> ${(p.comments||[]).length}</button>${isOwner()||p.authorId===me.id?`<button class="ab" onclick="showConfirm('Удалить?','',()=>delPost('${p.id}'),'Удалить','bd')"><i class="fas fa-trash"></i></button>`:''}</div></div>`;}).join('')||'<p style="color:var(--txt2)">Нет постов</p>'}`;document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));}

async function startDMCall(peerId,type){if(pc1){toast('Уже в звонке','err');return;}callType1=type;try{localStream=await navigator.mediaDevices.getUserMedia({video:type==='video',audio:true});}catch{toast('Разрешите камеру/микрофон','err');return;}const peer=fu(peerId);document.getElementById('vloc').srcObject=localStream;document.getElementById('cs-nm').textContent=peer?.name||'?';document.getElementById('cs-st').textContent='Вызов...';document.getElementById('b-cam').style.display=type==='video'?'flex':'none';document.getElementById('group-grid').style.display='none';document.getElementById('vrem').style.display='';document.getElementById('vloc').style.display='';document.getElementById('callscr').classList.add('active');callFrom=peerId;muted=false;camOff=false;pc1=new RTCPeerConnection(STUN);localStream.getTracks().forEach(t=>pc1.addTrack(t,localStream));pc1.ontrack=e=>{document.getElementById('vrem').srcObject=e.streams[0];document.getElementById('cs-st').textContent='Соединено ✓';};pc1.onicecandidate=e=>{if(e.candidate)wsSend({type:'call_ice',to:peerId,candidate:e.candidate});};pc1.onconnectionstatechange=()=>{if(['disconnected','failed','closed'].includes(pc1?.connectionState))endCall();};const offer=await pc1.createOffer();await pc1.setLocalDescription(offer);wsSend({type:'call_offer',to:peerId,offer,callType:type});}
function showIncoming1(m){document.getElementById('ic-av').src=m.callerAva||ava(m.callerName||'?');document.getElementById('ic-nm').textContent=m.callerName||'?';document.getElementById('ic-tp').textContent=m.callType==='video'?'📹 Видео':'📞 Аудио';document.getElementById('inc').classList.add('show');}
async function acceptCall(){document.getElementById('inc').classList.remove('show');if(!pendingCall)return;const{from,offer,callType:ct,callerName}=pendingCall;callFrom=from;callType1=ct;pendingCall=null;try{localStream=await navigator.mediaDevices.getUserMedia({video:ct==='video',audio:true});}catch{toast('Нет доступа','err');return;}document.getElementById('vloc').srcObject=localStream;document.getElementById('cs-nm').textContent=callerName||'?';document.getElementById('cs-st').textContent='Соединение...';document.getElementById('b-cam').style.display=ct==='video'?'flex':'none';document.getElementById('group-grid').style.display='none';document.getElementById('vrem').style.display='';document.getElementById('vloc').style.display='';document.getElementById('callscr').classList.add('active');muted=false;camOff=false;pc1=new RTCPeerConnection(STUN);localStream.getTracks().forEach(t=>pc1.addTrack(t,localStream));pc1.ontrack=e=>{document.getElementById('vrem').srcObject=e.streams[0];document.getElementById('cs-st').textContent='Соединено ✓';};pc1.onicecandidate=e=>{if(e.candidate)wsSend({type:'call_ice',to:from,candidate:e.candidate});};await pc1.setRemoteDescription(new RTCSessionDescription(offer));const answer=await pc1.createAnswer();await pc1.setLocalDescription(answer);wsSend({type:'call_answer',to:from,answer});}
function rejectCall(){document.getElementById('inc').classList.remove('show');if(pendingCall){wsSend({type:'call_reject',to:pendingCall.from});pendingCall=null;}}

// GROUP CALLS
async function startGroupCall(gId,type){if(Object.keys(groupPCs).length||pc1){toast('Уже в звонке','err');return;}try{localStream=await navigator.mediaDevices.getUserMedia({video:type==='video',audio:true});}catch{toast('Разрешите камеру/микрофон','err');return;}callRoom=gId;const g=allGroups.find(x=>x.id===gId);document.getElementById('cs-nm').textContent=g?g.name:'Групповой звонок';document.getElementById('cs-st').textContent='Присоединение...';document.getElementById('b-cam').style.display=type==='video'?'flex':'none';document.getElementById('vrem').style.display='none';document.getElementById('vloc').style.display='none';const grid=document.getElementById('group-grid');grid.style.display='grid';grid.innerHTML='';document.getElementById('callscr').classList.add('active');muted=false;camOff=false;addGTile('local',localStream,'Вы ('+me.name+')');wsSend({type:'call_room_join',roomId:gId,callType:type});}
function addGTile(id,stream,label){const grid=document.getElementById('group-grid');if(!grid)return;const old=document.getElementById('gt-'+id);if(old)old.remove();const div=document.createElement('div');div.id='gt-'+id;div.className='gtile';const v=document.createElement('video');v.autoplay=true;v.playsInline=true;if(id==='local')v.muted=true;v.srcObject=stream;const lbl=document.createElement('div');lbl.className='gtile-lbl';lbl.textContent=label;div.appendChild(v);div.appendChild(lbl);grid.appendChild(div);}
function removeGTile(id){document.getElementById('gt-'+id)?.remove();}
async function handleRoomPeers(peers){document.getElementById('cs-st').textContent=peers.length?`В звонке: ${peers.length+1}`:'Ожидание...';for(const p of peers)await createGPC(p,true);}
async function handlePeerJoined(pId){document.getElementById('cs-st').textContent=`В звонке: ${Object.keys(groupPCs).length+2}`;await createGPC(pId,false);}
function handlePeerLeft(pId){if(groupPCs[pId]){try{groupPCs[pId].close();}catch{}delete groupPCs[pId];}delete groupStreams[pId];removeGTile(pId);const cnt=Object.keys(groupPCs).length+1;document.getElementById('cs-st').textContent=cnt===1?'Вы одни':`В звонке: ${cnt}`;}
async function createGPC(pId,isInit){if(groupPCs[pId])return;const gpc=new RTCPeerConnection(STUN);groupPCs[pId]=gpc;if(localStream)localStream.getTracks().forEach(t=>gpc.addTrack(t,localStream));gpc.ontrack=e=>{groupStreams[pId]=e.streams[0];const u=fu(pId);addGTile(pId,e.streams[0],u?u.name:'?');};gpc.onicecandidate=e=>{if(e.candidate)wsSend({type:'call_room_signal',to:pId,roomId:callRoom,signal:{type:'ice',candidate:e.candidate}});};gpc.onconnectionstatechange=()=>{if(['disconnected','failed','closed'].includes(gpc.connectionState))handlePeerLeft(pId);};if(isInit){const offer=await gpc.createOffer();await gpc.setLocalDescription(offer);wsSend({type:'call_room_signal',to:pId,roomId:callRoom,signal:{type:'offer',sdp:offer}});}}
async function handleRoomSignal(m){const{from,signal,roomId}=m;if(!callRoom||callRoom!==roomId)return;if(!groupPCs[from])await createGPC(from,false);const gpc=groupPCs[from];if(!gpc)return;try{if(signal.type==='offer'){await gpc.setRemoteDescription(new RTCSessionDescription(signal.sdp));const ans=await gpc.createAnswer();await gpc.setLocalDescription(ans);wsSend({type:'call_room_signal',to:from,roomId,signal:{type:'answer',sdp:ans}});}else if(signal.type==='answer')await gpc.setRemoteDescription(new RTCSessionDescription(signal.sdp));else if(signal.type==='ice')await gpc.addIceCandidate(new RTCIceCandidate(signal.candidate));}catch(e){console.error('room signal:',e);}}
function endGroupCall(){Object.values(groupPCs).forEach(p=>{try{p.close();}catch{}});groupPCs={};groupStreams={};if(callRoom){wsSend({type:'call_room_leave',roomId:callRoom});callRoom=null;}document.getElementById('group-grid').style.display='none';}
function endCall(){if(pc1){try{pc1.close();}catch{}pc1=null;}if(callFrom){wsSend({type:'call_end',to:callFrom});callFrom=null;}endGroupCall();if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}document.getElementById('callscr').classList.remove('active');const vr=document.getElementById('vrem');if(vr)vr.srcObject=null;const vl=document.getElementById('vloc');if(vl)vl.srcObject=null;document.getElementById('vrem').style.display='';document.getElementById('vloc').style.display='';}
function toggleMute(){if(!localStream)return;muted=!muted;localStream.getAudioTracks().forEach(t=>t.enabled=!muted);const b=document.getElementById('b-mu');b.innerHTML=`<i class="fas fa-microphone${muted?'-slash':''}"></i>`;b.classList.toggle('muted',muted);}
function toggleCam(){if(!localStream)return;camOff=!camOff;localStream.getVideoTracks().forEach(t=>t.enabled=!camOff);const b=document.getElementById('b-cam');b.innerHTML=`<i class="fas fa-video${camOff?'-slash':''}"></i>`;b.classList.toggle('muted',camOff);}
